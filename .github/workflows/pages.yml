name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Publishes the site to the `gh-pages` branch (its root = production). Per-PR
# previews live alongside production under `pr-preview/` and are preserved here
# by `clean-exclude`, so a production deploy never wipes an open PR's preview.
permissions:
  contents: write

# Serialise every write to gh-pages (production + previews share this group) so
# concurrent jobs can't clobber each other's git push.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish master to gh-pages root (keep PR previews)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
          clean-exclude: |
            pr-preview/
