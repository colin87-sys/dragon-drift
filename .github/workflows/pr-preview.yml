name: PR Preview

# Deploys every pull request to a throwaway preview at
#   https://<user>.github.io/<repo>/pr-preview/pr-<N>/
# and comments the link on the PR. `closed` tears the preview back down when the
# PR is merged or closed. Free — runs on GitHub Actions + Pages only.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write          # push the preview to the gh-pages branch
  pull-requests: write     # comment the preview URL on the PR

# Shares the gh-pages concurrency group with the production deploy so writes to
# the branch are serialised (no clobbered pushes).
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Re-stamp the service-worker precache (VERSION + asset list) from current file
      # contents. Without this the SW keeps serving STALE js modules to returning
      # visitors — a fresh modelviewer.html with cached old builders — so toggles/edits
      # silently no-op until the cache clears. Deterministic + idempotent.
      - name: Stamp service worker precache
        run: node reforged/tools/stamp-sw.mjs

      # Stage the publishable site into a sibling dir BEFORE deploying. The deploy
      # action creates its temp worktree at the repo root and rsyncs the source
      # into a subfolder of it; with source-dir '.' that source IS the repo root,
      # which now contains the temp folder — so rsync recurses into the folder it's
      # writing and dies racing its own --delete ("file has vanished", exit 24).
      # Staging into ./_site (a sibling the temp folder is never inside) removes the
      # self-copy entirely. Excludes match what the deploy already drops (.git /
      # .github) plus _site itself.
      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'github-pages-deploy-action-temp-deployment-folder' \
            ./ _site/

      - name: Deploy / update / remove this PR's preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
