name: PR Preview

# Deploys every pull request to a throwaway preview at
#   https://<user>.github.io/<repo>/pr-preview/pr-<N>/
# and comments the link on the PR. `closed` tears the preview back down when the
# PR is merged or closed. Free — runs on GitHub Actions + Pages only.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write          # push the preview to the gh-pages branch
  pull-requests: write     # comment the preview URL on the PR

# Serialises preview writes to the gh-pages branch so two preview runs can't
# clobber each other's push. NOTE: this is a SEPARATE group from the production
# deploy (deploy-pages.yml uses group `pages`) — they intentionally do NOT share.
# This group guards git PUSHES to gh-pages; that one guards Pages DEPLOYMENTS.
concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Re-version the service worker from a content hash of the assets so a
      # changed build always reinstalls the SW instead of serving a stale cache.
      # Also regenerates js/buildId.js (the on-screen build stamp).
      - name: Stamp service worker
        run: node reforged/tools/stamp-sw.mjs

      # Stage the publishable site into a sibling dir BEFORE deploying. The deploy
      # action creates its temp worktree at the repo root and rsyncs the source
      # into a subfolder of it; with source-dir '.' that source IS the repo root,
      # which now contains the temp folder — so rsync recurses into the folder it's
      # writing and dies racing its own --delete ("file has vanished", exit 24).
      # Staging into ./_site (a sibling the temp folder is never inside) removes the
      # self-copy entirely. Excludes match what the deploy already drops (.git /
      # .github) plus _site itself.
      # A preview only needs to RUN: the reforged/ game + the root redirect stub (index.html →
      # ./reforged/) and its small support files. The repo root also holds dev-only image dumps
      # — mockups/ (~33MiB) + station-reference/ (~22MiB) + reforged-captures/ — that are NEVER
      # served. Left in, they rode along in EVERY preview (~55MiB dead weight each); enough open
      # previews then pushed the whole published site past Pages' 1GB cap. Exclude them here so a
      # preview is ~the game (~21MiB), not the whole repo (~78MiB).
      - name: Stage site
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'github-pages-deploy-action-temp-deployment-folder' \
            --exclude 'mockups' \
            --exclude 'station-reference' \
            --exclude 'reforged-captures' \
            --exclude 'godfall' \
            --exclude 'docs' \
            ./ _site/

      - name: Deploy / update / remove this PR's preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
