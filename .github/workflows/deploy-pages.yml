name: Deploy Pages

# Single source of truth for the live site now that Pages Source = "GitHub
# Actions". One deployment serves the WHOLE site, so we assemble it from two
# places and publish it as one artifact:
#   • production  → checked out fresh from `master` (the repo root IS the site)
#   • PR previews → the `pr-preview/` tree that pr-preview.yml still maintains on
#                   the `gh-pages` branch (that branch is now just a preview store,
#                   no longer served directly).
#
# Triggers:
#   • push to master            → production changed, redeploy.
#   • PR Preview workflow done  → a preview was added/updated/removed on
#                                 gh-pages; republish so it goes live. (workflow_run
#                                 fires even though that workflow pushed with the
#                                 default GITHUB_TOKEN.)
#   • manual                    → workflow_dispatch.
on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["PR Preview"]
    types: [completed]
  workflow_dispatch:
  # Safety net: a periodic catch-up publish so the live site can never stay frozen for long
  # if a deploy is ever dropped (transient Pages API error, a trigger that never fired, etc.).
  # Idempotent — republishes the current master + preview store; a no-op when already up to date.
  schedule:
    - cron: '37 */6 * * *'   # every 6 hours

permissions:
  contents: read       # read master + the gh-pages preview store
  pages: write         # deploy to the github-pages environment
  id-token: write      # OIDC for actions/deploy-pages

# Serialise deployments so concurrent triggers (a merge + a preview) can't race.
# cancel-in-progress: FALSE (was true). The published site is reassembled fresh from
# master + the gh-pages preview store every run, so it's idempotent — but cancelling a
# run *mid-deploy* (the "Deploy to GitHub Pages" step) leaves the Pages deployment API in
# a conflicted state, and on busy merge days that made even the LAST run in a burst FAIL,
# silently freezing the live site at a stale build. With cancel-in-progress:false, GitHub
# still keeps only ONE run queued behind the in-flight one (a newer pending run replaces
# the older pending run), so there's no backlog — but the running deploy finishes cleanly
# instead of being killed, so the API never conflicts and the latest content lands.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout production (master)
        uses: actions/checkout@v4
        with:
          path: src

      - name: Checkout preview store (gh-pages)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: ghp
        continue-on-error: true   # first run / no previews yet → just ship production

      # Re-version the service worker from a content hash so production never
      # serves a stale cache; also regenerates the on-screen build stamp.
      - name: Stamp service worker
        run: node src/reforged/tools/stamp-sw.mjs

      - name: Assemble the published site
        run: |
          mkdir -p _site
          # Production = the repo root, minus VCS/CI plumbing and the dev-only image dumps
          # (mockups/station-reference/reforged-captures/godfall/docs) — the live root redirects
          # to reforged/ so none of these are served; dropping them keeps the site well clear of
          # the 1GB Pages cap.
          rsync -a \
            --exclude '.git' --exclude '.github' \
            --exclude 'mockups' --exclude 'station-reference' --exclude 'reforged-captures' \
            --exclude 'godfall' --exclude 'docs' \
            src/ _site/
          # Overlay any PR previews preserved on gh-pages.
          if [ -d ghp/pr-preview ]; then
            rsync -a ghp/pr-preview _site/
          fi
          # Disable Jekyll so files/dirs beginning with _ are served verbatim.
          touch _site/.nojekyll

      # Fail fast with a clear message if the assembled site approaches GitHub
      # Pages' hard 1GB cap. Without this, an oversized site (usually stale
      # pr-preview/ dirs piling up on gh-pages) fails deep in the deploy with an
      # opaque "syncing_files → Deployment failed, try again later" that reads
      # like a transient outage. Guard well under 1GB to leave headroom.
      - name: Guard against the Pages size limit
        run: |
          mib=$(( $(du -sb _site | cut -f1) / 1024 / 1024 ))
          echo "Assembled site: ${mib} MiB (previews: $(ls -1 _site/pr-preview 2>/dev/null | wc -l))"
          limit=950
          if [ "$mib" -gt "$limit" ]; then
            echo "::error::Site is ${mib} MiB, over the ${limit} MiB guard — GitHub Pages hard-caps at 1GB. This is almost always stale pr-preview dirs on gh-pages; run the 'Prune stale PR previews' workflow (clears previews for closed PRs), then redeploy."
            exit 1
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-(re)create the Pages site if it was destroyed — e.g. a repo
          # private↔public toggle drops the Pages site resource, after which
          # configure-pages fails "Get Pages site failed" and the PR-preview
          # action's get-deployed-commit step fails "Failed to get commit SHA
          # from gh-pages". enablement:true recreates the site on deploy so the
          # live site + PR previews self-heal instead of needing a manual
          # Settings→Pages toggle. Harmless when the site already exists.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
