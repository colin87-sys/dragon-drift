<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>SVJ Mecha Dragon — motion test</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0a0d16;font-family:'Rajdhani',system-ui,sans-serif;color:#ffe9b0;-webkit-tap-highlight-color:transparent}
  #c{display:block;width:100vw;height:100vh;touch-action:none}
  .hud{position:fixed;left:14px;top:12px;pointer-events:none;text-shadow:0 1px 5px #000}
  .hud h1{margin:0;font-size:17px;letter-spacing:.16em;font-weight:600;color:#ffd11a}
  .hud p{margin:3px 0 0;font-size:12px;opacity:.7;letter-spacing:.04em}
  .panel{position:fixed;left:14px;bottom:14px;width:230px;background:#0c1320cc;border:1px solid #ffffff1f;border-radius:10px;padding:10px 12px;backdrop-filter:blur(4px)}
  .row{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:12px;letter-spacing:.06em}
  .row label{width:54px;color:#ffd11a;opacity:.85}
  .row input[type=range]{flex:1;accent-color:#ff8a3a}
  .row .v{width:30px;text-align:right;opacity:.7;font-variant-numeric:tabular-nums}
  .toggles{display:flex;gap:8px;margin-top:8px}
  .toggles button{flex:1;padding:9px 0;border-radius:8px;border:1px solid #ffffff22;background:#141a26;color:#ffe9b0;font:600 12px/1 'Rajdhani',sans-serif;letter-spacing:.1em;cursor:pointer}
  .toggles button.on{background:linear-gradient(#ffd11a,#ff6a18);color:#241000;border-color:#ffd11a}
  .zbtns{position:fixed;right:14px;bottom:16px;display:flex;gap:10px}
  .zbtns button{font-size:20px;padding:10px 16px;min-width:46px;border-radius:9px;border:1px solid #ffffff22;background:#141a26cc;color:#ffe9b0;cursor:pointer}
  .hint{position:fixed;right:14px;top:14px;font-size:11px;opacity:.5;letter-spacing:.05em;text-align:right}
</style>
<script type="importmap">{ "imports": { "three": "../lib/three.module.js" } }</script>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud"><h1>SVJ MECHA DRAGON</h1><p>active-aero · cruise / bank / pitch / boost / surge / brake · real bloom</p></div>
<div class="hint">drag to orbit · pinch / scroll / ± to zoom</div>
<div class="panel">
  <div class="row"><label>Bank</label><input id="bank" type="range" min="-1" max="1" step="0.01" value="0"><span class="v" id="bankv">0</span></div>
  <div class="row"><label>Pitch</label><input id="pitch" type="range" min="-1" max="1" step="0.01" value="0"><span class="v" id="pitchv">0</span></div>
  <div class="row"><label>Boost</label><input id="boost" type="range" min="0" max="1" step="0.01" value="0"><span class="v" id="boostv">0</span></div>
  <div class="row"><label>Surge</label><input id="surge" type="range" min="0" max="1" step="0.01" value="0"><span class="v" id="surgev">0</span></div>
  <div class="row"><label>Brake</label><input id="airbrake" type="range" min="0" max="1" step="0.01" value="0"><span class="v" id="airbrakev">0</span></div>
  <div class="row"><label>Speed</label><input id="speed" type="range" min="0" max="1" step="0.01" value="0.35"><span class="v" id="speedv">.35</span></div>
  <div class="toggles"><button id="demo" class="on">AUTO-DEMO</button><button id="spin">TURNTABLE</button></div>
</div>
<div class="zbtns"><button id="zout">−</button><button id="zin">+</button></div>
<script type="module">
import * as THREE from 'three';
import { EffectComposer } from '../lib/postprocessing/EffectComposer.js';
import { RenderPass } from '../lib/postprocessing/RenderPass.js';
import { UnrealBloomPass } from '../lib/postprocessing/UnrealBloomPass.js';
import { OutputPass } from '../lib/postprocessing/OutputPass.js';
import { buildSVJDragon } from './svjDragon.js';
import { updateSVJ } from './svjAnim.js';

const clamp = THREE.MathUtils.clamp, lerp = THREE.MathUtils.lerp;
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.18;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const sun = new THREE.DirectionalLight(0xffe0b0, 1.7); sun.position.set(-60, 45, -150); scene.add(sun);
scene.add(new THREE.HemisphereLight(0xd2e2ff, 0x4a4636, 1.2));
const fill = new THREE.DirectionalLight(0xcfe0ff, 0.75); fill.position.set(60, 18, 120); scene.add(fill);
const headlight = new THREE.DirectionalLight(0xffffff, 0.85); scene.add(headlight);
const sky = new THREE.Mesh(new THREE.SphereGeometry(120, 32, 16), new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: { top: { value: new THREE.Color(0x3f7ec8) }, mid: { value: new THREE.Color(0xe0a070) }, horizon: { value: new THREE.Color(0xffe2a8) } },
  vertexShader: 'varying vec3 vp; void main(){ vp = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }',
  fragmentShader: `varying vec3 vp; uniform vec3 top,mid,horizon; void main(){ float h = normalize(vp).y;
    vec3 c = h>0.0 ? mix(mid, top, smoothstep(0.0,0.55,h)) : mix(horizon, mid, smoothstep(-0.25,0.0,h)); gl_FragColor = vec4(c,1.0); }`,
}));
scene.add(sky); scene.fog = new THREE.Fog(0xe0a070, 30, 110);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), new THREE.MeshStandardMaterial({ color: 0x223042, roughness: 1, metalness: 0 }));
ground.rotation.x = -Math.PI / 2; ground.position.y = -3.2; scene.add(ground);

const { group: dragon } = buildSVJDragon();
const pivot = new THREE.Group(); pivot.add(dragon); scene.add(pivot);   // pivot carries body roll/bob; dragon carries the rig

// camera + orbit
const camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 300);
const target = new THREE.Vector3(0, 0.4, 1.4);
let az = 0.0, el = 0.16, dist = 12.5, spin = false;
function place() { camera.position.set(target.x + dist * Math.cos(el) * Math.sin(az), target.y + dist * Math.sin(el), target.z + dist * Math.cos(el) * Math.cos(az)); camera.lookAt(target); }
const ptrs = new Map();
const pdist = () => { const a = [...ptrs.values()]; return a.length < 2 ? 0 : Math.hypot(a[0].x - a[1].x, a[0].y - a[1].y); };
let pinch = 0; const zoom = (f) => { dist = clamp(dist * f, 4, 40); };
canvas.addEventListener('pointerdown', (e) => { ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY }); if (ptrs.size === 2) pinch = pdist(); });
const drop = (e) => { ptrs.delete(e.pointerId); if (ptrs.size < 2) pinch = 0; };
addEventListener('pointerup', drop); addEventListener('pointercancel', drop);
addEventListener('pointermove', (e) => { const p = ptrs.get(e.pointerId); if (!p) return;
  if (ptrs.size >= 2) { p.x = e.clientX; p.y = e.clientY; const d = pdist(); if (pinch && d) zoom(pinch / d); pinch = d; }
  else { az -= (e.clientX - p.x) * 0.006; el = clamp(el + (e.clientY - p.y) * 0.006, -0.15, 1.1); p.x = e.clientX; p.y = e.clientY; } });
addEventListener('wheel', (e) => zoom(e.deltaY > 0 ? 1.08 : 0.93), { passive: true });
document.getElementById('zin').addEventListener('click', () => zoom(0.85));
document.getElementById('zout').addEventListener('click', () => zoom(1.18));

// HDR bloom (same chain as the shop preview)
let composer = null;
function buildComposer() {
  const gl = renderer.getContext();
  if (!(renderer.capabilities.isWebGL2 && (gl.getExtension('EXT_color_buffer_float') || gl.getExtension('EXT_color_buffer_half_float')))) return;
  const rt = new THREE.WebGLRenderTarget(innerWidth, innerHeight, { type: THREE.HalfFloatType, samples: 4 });
  composer = new EffectComposer(renderer, rt);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.38, 0.5, 0.95));
  composer.addPass(new OutputPass());
  composer.setPixelRatio(Math.min(devicePixelRatio, 2)); composer.setSize(innerWidth, innerHeight);
}
function resize() { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); if (composer) composer.setSize(innerWidth, innerHeight); }
addEventListener('resize', resize); renderer.setSize(innerWidth, innerHeight); buildComposer();

// ── controls ──────────────────────────────────────────────────────────────────
let demo = true;
const ids = ['bank', 'pitch', 'boost', 'surge', 'airbrake', 'speed'];
const el$ = Object.fromEntries(ids.map((k) => [k, document.getElementById(k)]));
const v$ = Object.fromEntries(ids.map((k) => [k, document.getElementById(k + 'v')]));
ids.forEach((k) => el$[k].addEventListener('input', () => { demo = false; document.getElementById('demo').classList.remove('on'); }));
document.getElementById('demo').addEventListener('click', (e) => { demo = !demo; e.target.classList.toggle('on', demo); });
document.getElementById('spin').addEventListener('click', (e) => { spin = !spin; e.target.classList.toggle('on', spin); });

// scripted auto-demo timeline → showcases each motion / state in turn
function demoState(t) {
  const p = t % 24, w = Math.sin(t * 1.3);
  const z = { bank: 0, pitch: 0, boost: 0, surge: 0, airbrake: 0, speed: 0.3 };
  if (p < 3)  return { ...z };                                                                 // cruise
  if (p < 8)  return { ...z, bank: w, pitch: 0.2 * w, speed: 0.5 };                            // weave / bank
  if (p < 11) return { ...z, pitch: Math.sin(t * 0.9), speed: 0.5 };                           // pitch climb/dive
  if (p < 15) return { ...z, bank: 0.4 * w, pitch: -0.15, boost: 1, speed: 1 };                // boost (tuck + flame)
  if (p < 19) return { ...z, bank: 0.6 * w, boost: 1, surge: 1, speed: 1 };                    // surge battle-mode
  return { ...z, airbrake: 1, pitch: 0.15, speed: 0.15 };                                      // airbrake / decel
}

let bodyRoll = 0, bodyBob = 0;
const clock = new THREE.Clock();
function frame() {
  const dt = Math.min(clock.getDelta(), 0.05), t = clock.elapsedTime;
  let st;
  if (demo) {
    st = demoState(t);
    ids.forEach((k) => { el$[k].value = st[k]; v$[k].textContent = (+st[k]).toFixed(2).replace(/^0/, '').replace(/^-0/, '-'); });
  } else {
    st = { bank: +el$.bank.value, pitch: +el$.pitch.value, boost: +el$.boost.value, surge: +el$.surge.value, airbrake: +el$.airbrake.value, speedNorm: +el$.speed.value };
    ids.forEach((k) => v$[k].textContent = (+el$[k].value).toFixed(2).replace(/^0/, '').replace(/^-0/, '-'));
  }
  if (st.speed !== undefined) st.speedNorm = st.speed;

  updateSVJ(dragon, dt, st);                                  // ← the shared driver

  // host-side body motion (the game does this too): the driver reports the desired
  // roll/pitch into the manoeuvre; the host eases the body there + adds engine vibe.
  const A = dragon.userData.anim;
  bodyRoll = lerp(bodyRoll, A._bodyRoll || 0, 1 - Math.exp(-7 * dt));
  bodyBob = lerp(bodyBob, A._bodyPitch || 0, 1 - Math.exp(-6 * dt));
  pivot.rotation.z = bodyRoll;
  pivot.rotation.x = bodyBob;
  pivot.rotation.y = A._bodyYaw || 0;
  pivot.position.y = (A._vibration || 0);
  if (spin) az += 0.004;

  place(); headlight.position.copy(camera.position);
  if (composer) composer.render(); else renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
