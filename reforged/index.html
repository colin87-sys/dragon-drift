  <script>
    // TEMP DIAGNOSTIC (Tempest black-screen hunt) — surfaces the FIRST fatal render error
    // on-screen. Real-device GPUs fail where the headless software GL does not, and one test
    // device has no console, so we can't otherwise see the cause. Only reveals itself when a
    // GPU/render-fatal error fires → invisible to normal play. Remove once diagnosed.
    (function () {
      var shown = false;
      function show(tag, msg) {
        try {
          var pre = document.getElementById('__diag_pre');
          if (shown && pre) { pre.textContent += '\n[' + tag + '] ' + msg; return; }
          shown = true;
          var d = document.createElement('div');
          d.style.cssText = 'position:fixed;left:0;top:0;right:0;z-index:99999;max-height:65%;overflow:auto;background:rgba(130,0,0,.94);color:#fff;font:12px/1.45 monospace;padding:10px;white-space:pre-wrap;';
          d.innerHTML = '<b>DIAG (temporary): first render error — screenshot this</b>';
          pre = document.createElement('div'); pre.id = '__diag_pre'; pre.style.marginTop = '6px';
          pre.textContent = '[' + tag + '] ' + msg;
          d.appendChild(pre);
          (document.body || document.documentElement).appendChild(d);
        } catch (e) {}
      }
      window.addEventListener('error', function (e) {
        show('error', (e.message || 'error') + '  @ ' + (e.filename || '').split('/').pop() + ':' + (e.lineno || ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason; show('promise', (r && (r.stack || r.message)) || String(r));
      });
      var _ce = console.error;
      console.error = function () {
        try {
          var s = Array.prototype.map.call(arguments, function (a) { return (a && a.stack) || String(a); }).join(' ');
          if (/shader|program|link|compile|WebGL|GL_|framebuffer|context lost|INVALID_/i.test(s)) show('gl', s.slice(0, 1000));
        } catch (e) {}
        return _ce.apply(console, arguments);
      };
      window.addEventListener('webglcontextlost', function () { show('webgl', 'WEBGL CONTEXT LOST'); }, true);
    })();
  </script>
</head>
<body>
  <div class="load-hint">
    <h1 class="wordmark">DRAGON DRIFT</h1>
    <div class="load-bar"><span></span></div>
    <p class="load-tip"></p>
    <p class="load-fallback">Loading stalled? This game needs a web server — open <code>http://localhost:8002</code> instead of the file directly.</p>
  </div>
  <script>
    // Picked before the 1.3MB module parse so the tip shows during load.
    (function () {
      var tips = [
        'Thread the gates — windows pay like rings.',
        'Perfect centers chain a melody. Keep it going.',
        'Hold a second finger to boost. Swipe it sideways to roll.',
        'Chain rings to light the Dragon Surge.',
        'Golden embers are worth ◆25 — chase the comets.',
        'First flight each day banks ×1.5 embers.',
        'Assists off = a permanent score bonus.',
        'Barrel roll through trouble — the i-frames are real.',
      ];
      var el = document.querySelector('.load-tip');
      if (el) el.textContent = tips[Math.floor(Math.random() * tips.length)];
    })();
  </script>
  <script>
    // Installable + offline replay. The SW (sw.js) is cache-first WITHIN a
    // content-hashed version, so a single load always replays one coherent build.
    // To stop an already-open tab from getting stuck on an old build after a
    // deploy, we (a) re-check for a new sw.js whenever the tab regains focus, and
    // (b) reload ONCE when a new SW takes control — the live page is still running
    // the previous cached modules, so one reload swaps in the freshly-cached build.
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(function (reg) {
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(function () {});
        // Only when a controller already exists is a controllerchange an UPDATE
        // (not the first install) — guard so first load never spuriously reloads,
        // and the flag makes the reload strictly one-shot (no loops).
        if (navigator.serviceWorker.controller) {
          var ddReloaded = false;
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (ddReloaded) return;
            ddReloaded = true;
            location.reload();
          });
        }
      });
    }
  </script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
