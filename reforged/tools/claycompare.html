<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>html,body{margin:0;background:#3a3f47}</style>
  <script type="importmap">{ "imports": { "three": "/lib/three.module.js" } }</script>
</head>
<body>
  <canvas id="montage" width="1500" height="520"></canvas>
  <canvas id="gl" width="500" height="500" style="display:none"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { DRAGONS } from '/js/dragons.js';
    import { ascendedDef } from '/js/ascension.js';
    import { buildDragonModel } from '/js/dragonModel.js';

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, alpha: true, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(2);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 200);
    // neutral clay studio light — matte, no colour, so only SHAPE reads (like the ref).
    scene.add(new THREE.HemisphereLight(0xffffff, 0x4a4e55, 1.05));
    const k1 = new THREE.DirectionalLight(0xffffff, 1.5); k1.position.set(3, 5, 4); scene.add(k1);
    const k2 = new THREE.DirectionalLight(0xffffff, 0.6); k2.position.set(-4, 2, -2); scene.add(k2);
    const k3 = new THREE.DirectionalLight(0xffffff, 0.35); k3.position.set(0, -3, 3); scene.add(k3);

    const CLAY = new THREE.MeshStandardMaterial({ color: 0xb6b9be, roughness: 0.78, metalness: 0.0, side: THREE.DoubleSide });

    // Views: dir = camera direction (will be normalised); label drawn under each.
    const VIEWS = [
      { label: 'SIDE',  dir: [1, 0.06, 0.02] },
      { label: 'TOP',   dir: [0.02, 1, 0.04] },
      { label: '3/4 FRONT', dir: [0.85, 0.30, -0.62] },
    ];

    let current = null;
    const _box = new THREE.Box3();

    function buildClay(key, tier) {
      if (current) { scene.remove(current); current.traverse(o => { if (o.geometry) o.geometry.dispose(); }); }
      const def = ascendedDef(DRAGONS[key], tier, 0);
      const { group } = buildDragonModel(def, { preview: true });   // preview drops the aim marker
      group.traverse(o => {
        if (o.isSprite) o.visible = false;                          // hide aura/glow sprites
        if (o.isMesh || o.isSkinnedMesh) o.material = CLAY;         // flat clay everywhere
      });
      current = group; scene.add(group);
      group.updateMatrixWorld(true);
      _box.setFromObject(group);
      return _box.clone();
    }

    function renderView(box, dir) {
      const c = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const radius = Math.max(size.x, size.y, size.z) * 0.5;
      const fov = camera.fov * Math.PI / 180;
      const dist = (radius / Math.sin(fov / 2)) * 1.18;
      const d = new THREE.Vector3(...dir).normalize();
      camera.position.copy(c).addScaledVector(d, dist);
      camera.near = dist / 100; camera.far = dist * 10;
      camera.updateProjectionMatrix();
      camera.lookAt(c);
      renderer.render(scene, camera);
    }

    window.renderClay = (key, tier = 3) => {
      const box = buildClay(key, tier);
      const m = document.getElementById('montage');
      const ctx = m.getContext('2d');
      ctx.fillStyle = '#3a3f47'; ctx.fillRect(0, 0, m.width, m.height);
      const PW = 500;
      VIEWS.forEach((v, i) => {
        renderView(box, v.dir);
        ctx.drawImage(gl, i * PW + 10, 6, 480, 480);
        ctx.fillStyle = '#e8e8e8'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(v.label, i * PW + PW / 2, 510);
      });
      return true;
    };
    window.__ready = true;
  </script>
</body>
</html>
