<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dragon Drift — Model Viewer</title>
<script type="importmap">{ "imports": { "three": "../lib/three.module.js" } }</script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e14;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; color: #dfe6f2; }
  #view { position: fixed; inset: 0; touch-action: none; cursor: grab; }
  #view.drag { cursor: grabbing; }
  .panel { position: fixed; z-index: 10; background: rgba(16,20,30,0.82); border: 1px solid #2a3346;
    border-radius: 12px; padding: 12px 14px; backdrop-filter: blur(8px); }
  #ui { top: 12px; left: 12px; display: flex; flex-direction: column; gap: 10px; min-width: 210px; }
  #ui h1 { margin: 0 0 2px; font-size: 14px; font-weight: 650; letter-spacing: .02em; }
  #ui .sub { font-size: 11px; color: #8b97ad; margin-top: -4px; }
  label { font-size: 11px; color: #9aa6bd; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .04em; }
  select, .row { width: 100%; }
  select { background: #1a2030; color: #e6edf8; border: 1px solid #313c52; border-radius: 8px;
    padding: 7px 8px; font-size: 13px; }
  .forms { display: flex; gap: 4px; }
  .forms button { flex: 1; background: #1a2030; color: #c2cce0; border: 1px solid #313c52; border-radius: 7px;
    padding: 6px 0; font-size: 11px; cursor: pointer; }
  .forms button.on { background: #2d6cff; border-color: #2d6cff; color: #fff; }
  .toggles { display: flex; gap: 14px; font-size: 12px; color: #b6c1d6; }
  .toggles label { display: flex; align-items: center; gap: 6px; text-transform: none; letter-spacing: 0; margin: 0; cursor: pointer; }
  #hint { bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #8b97ad;
    padding: 7px 14px; }
  #name { bottom: 12px; right: 12px; text-align: right; font-size: 12px; }
  #name b { font-size: 15px; color: #fff; } #name span { color: #8b97ad; }
  /* ── mobile / narrow screens ── */
  @media (max-width: 600px), (pointer: coarse) {
    #ui { left: 8px; top: 8px; width: 200px; min-width: 0; padding: 9px 11px; gap: 8px; }   /* left-anchored, never covers the model */
    #ui h1 { font-size: 13px; } #ui .sub { font-size: 10px; }
    select { font-size: 14px; padding: 9px 8px; }            /* easier tap */
    .forms button { padding: 10px 0; font-size: 12px; }      /* bigger tap targets */
    .toggles { font-size: 13px; gap: 18px; } .toggles input { width: 17px; height: 17px; }
    #hint { font-size: 11px; padding: 6px 10px; bottom: 8px; white-space: nowrap; }
    #name { bottom: 8px; right: 8px; padding: 6px 9px; font-size: 11px; } #name b { font-size: 13px; }
  }
</style>
</head>
<body>
<canvas id="view"></canvas>
<div id="ui" class="panel">
  <div><h1>Model Viewer</h1><div class="sub">drag to rotate · scroll to zoom</div></div>
  <div class="row"><label>Dragon</label><select id="pick"></select></div>
  <div class="row"><label>Form</label><div class="forms" id="forms"></div></div>
  <div class="toggles">
    <label><input type="checkbox" id="spin"> auto-spin</label>
    <label><input type="checkbox" id="flap"> animate</label>
  </div>
  <div id="cmpbox"><div class="sub">Compare changes (toggle off = before):</div>
    <div class="toggles">
      <label><input type="checkbox" id="armor" checked> armor</label>
      <label><input type="checkbox" id="ftail" checked> flame tail</label>
    </div>
  </div>
</div>
<div id="hint" class="panel">1 finger / drag = rotate • 2 fingers = pinch-zoom &amp; pan • double-tap = reset</div>
<div id="name" class="panel"><b id="nm">—</b><br><span id="fm">—</span></div>

<script type="module">
import * as THREE from 'three';
import { DRAGONS } from '../js/dragons.js';
import { ascendedDef } from '../js/ascension.js';
import { buildDragonModel, makePreviewTick } from '../js/dragonModel.js';

const FNAME = ['Hatchling', 'Kindled', 'Radiant', 'Eternal'];
const canvas = document.getElementById('view');

// Renderer + scene + lights (matched to the shop/hero look: ACES tonemap, warm key
// + cool rim + soft fill, hemisphere ambient). Layer 1 enabled so core/edge GLOWS show.
const gl = new THREE.WebGLRenderer({ canvas, antialias: true });
gl.setPixelRatio(Math.min(devicePixelRatio, 2));
gl.toneMapping = THREE.ACESFilmicToneMapping;
gl.toneMappingExposure = 1.3;
const scene = new THREE.Scene();
// Studio gradient backdrop (lighter centre → dark edges) so the dark-membrane dragons
// read as a clear silhouette instead of vanishing into a flat void.
(() => {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d').createRadialGradient(256, 230, 40, 256, 256, 360);
  g.addColorStop(0, '#33415c'); g.addColorStop(0.5, '#222c40'); g.addColorStop(1, '#0c1019');
  const ctx = c.getContext('2d'); ctx.fillStyle = g; ctx.fillRect(0, 0, 512, 512);
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace;
  scene.background = tex;
})();
const camera = new THREE.PerspectiveCamera(40, 1, 0.05, 200);
camera.layers.enable(1);
scene.add(new THREE.HemisphereLight(0xbfdcff, 0x2e3448, 1.05));
const kL = new THREE.DirectionalLight(0xffe8c0, 2.0); kL.position.set(3, 4.5, 5); scene.add(kL);
const rL = new THREE.DirectionalLight(0x88b8ff, 1.05); rL.position.set(-4, 2, -3); scene.add(rL);
const fL = new THREE.DirectionalLight(0xd0f0ff, 0.7); fL.position.set(0, -2, 3); scene.add(fL);
const bL = new THREE.DirectionalLight(0xffffff, 0.6); bL.position.set(0, 3, -6); scene.add(bL);   // back light lifts dark membranes
// A faint ground glow so the dark dragons read against the void.
const glow = new THREE.Mesh(new THREE.CircleGeometry(6, 48),
  new THREE.MeshBasicMaterial({ color: 0x16203a, transparent: true, opacity: 0.5 }));
glow.rotation.x = -Math.PI / 2; glow.position.y = -1.6; scene.add(glow);

// ── orbit state (camera around a fixed look-at center) ──
let az = 0.6, pol = 0.95, dist = 10, center = new THREE.Vector3(), homeCenter = new THREE.Vector3();   // near-level rear-3/4
let baseDist = 10;
function applyCam() {
  const sp = Math.sin(pol), cp = Math.cos(pol);
  camera.position.set(center.x + dist * sp * Math.sin(az), center.y + dist * cp, center.z + dist * sp * Math.cos(az));
  camera.lookAt(center);
}
const clampPol = (p) => Math.max(0.12, Math.min(3.02, p));
const clampDist = (d) => Math.max(baseDist * 0.28, Math.min(baseDist * 3.2, d));
function resetView() { az = 0.6; pol = 0.95; dist = baseDist; center.copy(homeCenter); }
// PAN: slide the look-at point in the camera's screen plane (two-finger drag / right-drag).
function pan(dx, dy) {
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
  const up = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion);
  const k = dist * 0.0022;
  center.addScaledVector(right, -dx * k).addScaledVector(up, dy * k);
}

// Unified multi-pointer input (mouse + touch): 1 pointer = ORBIT, 2 pointers =
// PINCH-zoom + two-finger PAN. Tracks every active pointer so phones work.
const ptrs = new Map();
let gesture = {};   // { d, mid } baseline for the 2-finger pinch/pan
canvas.addEventListener('pointerdown', (e) => { ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY }); canvas.classList.add('drag'); canvas.setPointerCapture(e.pointerId); });
function endPtr(e) { ptrs.delete(e.pointerId); if (ptrs.size < 2) gesture = {}; if (ptrs.size === 0) canvas.classList.remove('drag'); }
canvas.addEventListener('pointerup', endPtr);
canvas.addEventListener('pointercancel', endPtr);
canvas.addEventListener('pointermove', (e) => {
  if (!ptrs.has(e.pointerId)) return;
  const prev = ptrs.get(e.pointerId);
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (ptrs.size === 1) {
    if (e.shiftKey || e.button === 2) pan(dx, dy);          // shift/right-drag = pan on desktop
    else { az -= dx * 0.01; pol = clampPol(pol - dy * 0.01); }
  } else if (ptrs.size >= 2) {
    const [a, b] = [...ptrs.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    if (gesture.d) dist = clampDist(dist * gesture.d / d);   // fingers apart → zoom in
    if (gesture.mid) pan(mid.x - gesture.mid.x, mid.y - gesture.mid.y);
    gesture.d = d; gesture.mid = mid;
  }
});
canvas.addEventListener('wheel', (e) => { e.preventDefault(); dist = clampDist(dist * (1 + Math.sign(e.deltaY) * 0.09)); }, { passive: false });
canvas.addEventListener('dblclick', resetView);
canvas.addEventListener('contextmenu', (e) => e.preventDefault());   // allow right-drag pan

// ── model loading ──
const _box = new THREE.Box3(), _b = new THREE.Box3();
function bounds(root) {
  _box.makeEmpty(); root.updateWorldMatrix(true, true);
  root.traverse((o) => { if (o.isMesh && o.geometry) {
    if (!o.geometry.boundingBox) o.geometry.computeBoundingBox();
    _b.copy(o.geometry.boundingBox).applyMatrix4(o.matrixWorld); _box.union(_b);
  } });
  return _box;
}
let current = null, tick = null, t = 0;
// Build the resolved def for a form, applying the "Compare changes" toggles so the
// recent tweaks can be flipped off to see the BEFORE state (a deep-cloned blueprint,
// so the roster data is untouched).
function defFor(key, tier) {
  const armor = document.getElementById('armor');
  const ftail = document.getElementById('ftail');
  const clone = JSON.parse(JSON.stringify(DRAGONS[key]));   // blueprints are pure data
  if (clone.parts) {
    if (armor && !armor.checked) delete clone.parts.shingle;                       // strip the armor plating
    if (ftail && !ftail.checked && clone.parts.tail === 'monarchTail') clone.parts.tail = 'monarchTailBead';  // pre-redo bead tail
  }
  return ascendedDef(clone, tier, 0);
}
function load(key, tier, keepView = false) {
  if (current) { scene.remove(current.group); current.group.traverse(o => { if (o.geometry) o.geometry.dispose(); }); }
  const def = defFor(key, tier);
  const result = buildDragonModel(def, { preview: true });
  // the preview build wraps the dragon in an extra group — unwrap for clean framing.
  const group = result.group;
  group.traverse(o => { if (o.renderOrder >= 998) o.visible = false; });   // hide the gameplay aim pip
  scene.add(group);
  tick = makePreviewTick(def, result);
  current = { group, result };
  // BOUNDING-SPHERE framing against the SMALLER FOV axis: guarantees the whole creature
  // fits in BOTH portrait and landscape AND never clips as it rotates (the sphere is
  // rotation-invariant). keepView (a compare-toggle reload on the SAME dragon) PRESERVES
  // the current camera (rotation/zoom/pan) — only refresh the clamp + reset target; a
  // dragon/form change reframes from scratch.
  const box = bounds(group);
  const c = box.getCenter(new THREE.Vector3());
  const R = box.getSize(new THREE.Vector3()).length() / 2;
  const fovV = camera.fov * Math.PI / 180;
  const fovH = 2 * Math.atan(Math.tan(fovV / 2) * camera.aspect);
  const fit = R / Math.sin(Math.min(fovV, fovH) / 2) * 1.04 + 0.3;
  homeCenter.copy(c);            // reset target (double-tap) always tracks the model
  baseDist = fit;                // refresh the zoom-clamp reference
  if (!keepView) { center.copy(c); dist = fit; }   // reframe only on dragon/form change
  document.getElementById('nm').textContent = DRAGONS[key].name || key;
  document.getElementById('fm').textContent = FNAME[tier] + ' · ' + (DRAGONS[key].rarity || '');
}

// ── UI ──
const pick = document.getElementById('pick');
const keys = Object.keys(DRAGONS);
pick.innerHTML = keys.map(k => `<option value="${k}">${DRAGONS[k].name || k}</option>`).join('');
let curKey = keys.includes('flameMonarch') ? 'flameMonarch' : keys[0];
let curTier = 3;
pick.value = curKey;

const formsEl = document.getElementById('forms');
function renderForms() {
  const n = (DRAGONS[curKey].forms || []).length || 4;
  formsEl.innerHTML = Array.from({ length: n }, (_, i) =>
    `<button data-t="${i}" class="${i === curTier ? 'on' : ''}">${['H','K','R','E'][i] || i}</button>`).join('');
  [...formsEl.children].forEach(b => b.onclick = () => { curTier = +b.dataset.t; renderForms(); load(curKey, Math.min(curTier, n - 1)); });
}
pick.onchange = () => { curKey = pick.value; curTier = Math.min(curTier, ((DRAGONS[curKey].forms || []).length || 4) - 1); renderForms(); updateCmpVisibility(); load(curKey, curTier); };

const spin = document.getElementById('spin'), flap = document.getElementById('flap');
// Compare toggles + show the box only for dragons that have something to compare.
// Compare toggles keep the current camera (keepView=true) — only the geometry swaps.
const reload = () => load(curKey, Math.min(curTier, ((DRAGONS[curKey].forms || []).length || 4) - 1), true);
['armor', 'ftail'].forEach(id => document.getElementById(id).addEventListener('change', reload));
function updateCmpVisibility() {
  const p = DRAGONS[curKey].parts || {};
  const has = !!p.shingle || p.tail === 'monarchTail';
  document.getElementById('cmpbox').style.display = has ? '' : 'none';
}

function resize() { const w = innerWidth, h = innerHeight; gl.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix(); }
addEventListener('resize', resize);
addEventListener('orientationchange', () => setTimeout(() => { resize(); load(curKey, Math.min(curTier, ((DRAGONS[curKey].forms || []).length || 4) - 1)); }, 200));
resize();   // set aspect BEFORE the first load so portrait framing is correct

renderForms();
updateCmpVisibility();
load(curKey, curTier);

let last = performance.now();
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000); last = now; t += dt;
  if (spin.checked && ptrs.size === 0) az -= dt * 0.5;
  if (tick && flap.checked) tick(t);
  else if (tick) tick(0);   // hold a static spread pose when not animating
  applyCam();
  gl.render(scene, camera);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
