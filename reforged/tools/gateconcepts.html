<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Gate Concepts</title>
  <style>
    html,body{margin:0;height:100%;background:#0a0e1a;overflow:hidden;font-family:system-ui,sans-serif}
    #gl{position:fixed;left:0;top:0}
    #sheet{position:fixed;left:0;top:0;display:none;background:#0a0e1a}
    #err{position:fixed;left:12px;right:12px;top:12px;color:#ff9a9a;font-size:13px;white-space:pre-wrap;background:rgba(40,8,8,.7);padding:10px;border-radius:8px;display:none}
  </style>
  <script type="importmap">{ "imports": { "three": "../lib/three.module.js" } }</script>
  <script>
    window.__gcerr = (m) => { const e = document.getElementById('err'); if (e) { e.style.display='block'; e.textContent='Concept error:\n'+m; } };
    window.addEventListener('error', (ev) => window.__gcerr((ev.error && ev.error.stack) || ev.message || String(ev)));
    window.addEventListener('unhandledrejection', (ev) => window.__gcerr('Promise: ' + ((ev.reason && ev.reason.stack) || ev.reason)));
  </script>
</head>
<body>
  <canvas id="gl" width="700" height="700"></canvas>
  <canvas id="sheet"></canvas>
  <div id="err"></div>
  <script type="module">
    import * as THREE from 'three';

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.25;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(44, 1, 0.1, 6000);
    scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x40342a, 1.5));
    const sun = new THREE.DirectionalLight(0xffc888, 2.6); sun.position.set(-3, 1.4, 4); scene.add(sun);
    const rim = new THREE.DirectionalLight(0xffe0b0, 1.2); rim.position.set(3, 2.0, -3); scene.add(rim);
    const fill = new THREE.DirectionalLight(0x9fc4ff, 0.6); fill.position.set(2, 0.5, 3); scene.add(fill);

    function gradTex(stops) {
      const c = document.createElement('canvas'); c.width = 8; c.height = 256;
      const g = c.getContext('2d'); const grd = g.createLinearGradient(0, 0, 0, 256);
      for (const [p, col] of stops) grd.addColorStop(p, col);
      g.fillStyle = grd; g.fillRect(0, 0, 8, 256);
      const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
    }
    scene.background = gradTex([[0, '#241f47'], [0.42, '#7a4a86'], [0.6, '#e07a4a'], [0.8, '#ffb060'], [1, '#ffd89a']]);

    // Mirror-ish water: a dark plane at y=0. Reflection is faked by a mirrored clone
    // of the gate group (scale.y=-1) at reduced brightness — enough to read grounding.
    const water = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000),
      new THREE.MeshStandardMaterial({ color: 0x2a3a54, roughness: 0.2, metalness: 0.4 }));
    water.rotation.x = -Math.PI / 2; water.position.y = 0; scene.add(water);

    // ---- shared material helpers ----
    const stone = (c) => new THREE.MeshStandardMaterial({ color: c, flatShading: true, roughness: 0.7, metalness: 0.05 });
    // glow = UNLIT bright colour (no bloom in this throwaway studio, so simulate it):
    // reads as a light source even without post-processing.
    const glowM = (c) => new THREE.MeshBasicMaterial({ color: c });
    const lineM = (c) => new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.95 });
    const jitterBox = (w, h, d, jit = 0.06) => {
      const g = new THREE.BoxGeometry(w, h, d, 2, 3, 1).toNonIndexed();
      const p = g.getAttribute('position');
      for (let i = 0; i < p.count; i++) p.setXYZ(i, p.getX(i) + (Math.random() - .5) * jit * w, p.getY(i) + (Math.random() - .5) * jit * h, p.getZ(i) + (Math.random() - .5) * jit * d);
      g.computeVertexNormals(); return g;
    };

    // ==== CONCEPT 1: WAYSTONE — leaning monoliths + cracked lintel + runes ====
    function waystone(tint) {
      const g = new THREE.Group();
      const rock = stone(0x525a6e), rune = glowM(tint, 1.8);
      for (const s of [-1, 1]) {
        const col = new THREE.Mesh(jitterBox(6, 30, 5), rock);
        col.position.set(s * 11, 15, 0); col.rotation.z = -s * 0.06; g.add(col);
        // recessed glowing rune channel on the inner face
        for (let k = 0; k < 4; k++) {
          const r = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3.2, 0.4), rune);
          r.position.set(s * 8.3, 6 + k * 6, 2.4); g.add(r);
        }
      }
      // cracked lintel (two offset chunks, a gap between)
      for (const s of [-1, 1]) {
        const l = new THREE.Mesh(jitterBox(11, 4.5, 5.5), rock);
        l.position.set(s * 6.2, 30.5, 0); l.rotation.z = s * 0.03; g.add(l);
      }
      // floating broken chunks near the lintel
      for (let k = 0; k < 5; k++) {
        const c = new THREE.Mesh(new THREE.TetrahedronGeometry(1.1 + Math.random()), rock);
        c.position.set((Math.random() - .5) * 16, 33 + Math.random() * 6, (Math.random() - .5) * 4);
        c.rotation.set(Math.random(), Math.random(), Math.random()); g.add(c);
      }
      return g;
    }

    // ==== CONCEPT 2: ASTROLABE — concentric broken rings + orbiting plates ====
    function astrolabe(tint) {
      const g = new THREE.Group(); const cy = 15;
      const ringR = [13, 18, 23];
      ringR.forEach((R, i) => {
        const arc = Math.PI * (1.3 + i * 0.15);
        const t = new THREE.Mesh(new THREE.TorusGeometry(R, 0.9, 6, 40, arc), stone(0x3a4358));
        t.position.set(0, cy, 0); t.rotation.z = i * 1.1; g.add(t);
        // emissive inlay (thinner bright torus, same arc)
        const inlay = new THREE.Mesh(new THREE.TorusGeometry(R, 0.28, 6, 40, arc), glowM(tint, 2.0));
        inlay.position.set(0, cy, 0); inlay.rotation.z = i * 1.1; g.add(inlay);
        // line orbit circle
        const pts = []; for (let a = 0; a <= 48; a++) { const th = a / 48 * Math.PI * 2; pts.push(new THREE.Vector3(Math.cos(th) * R, cy + Math.sin(th) * R, 0)); }
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineM(tint)));
      });
      // orbiting rune-plates
      for (let k = 0; k < 10; k++) {
        const R = 13 + Math.random() * 12, th = Math.random() * Math.PI * 2;
        const pl = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.6, 0.4), glowM(tint, 1.4));
        pl.position.set(Math.cos(th) * R, cy + Math.sin(th) * R, (Math.random() - .5) * 2);
        pl.rotation.z = th; g.add(pl);
      }
      return g;
    }

    // ==== CONCEPT 3: NIGHTBLOOM — iris of petals (opened) + glowing veins ====
    function petalGeo(len, wid, curve) {
      const seg = 7, pos = [], idx = [];
      for (let i = 0; i <= seg; i++) {
        const t = i / seg, y = t * len, w = Math.sin(t * Math.PI * 0.9) * wid * (1 - 0.25 * t), z = Math.sin(t * Math.PI) * curve;
        pos.push(-w, y, z, w, y, z);
      }
      for (let i = 0; i < seg; i++) { const a = i * 2; idx.push(a, a + 1, a + 2, a + 1, a + 3, a + 2); }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3)); g.setIndex(idx);
      g.computeVertexNormals(); return g;
    }
    function nightbloom(tint) {
      const g = new THREE.Group(); const cy = 15, N = 8, R = 6;
      const petalMat = new THREE.MeshStandardMaterial({ color: 0x2a3550, emissive: new THREE.Color(tint), emissiveIntensity: 0.35, roughness: 0.5, side: THREE.DoubleSide, flatShading: true });
      for (let i = 0; i < N; i++) {
        const a = i / N * Math.PI * 2;
        const pg = petalGeo(20, 4.5, 5);
        const m = new THREE.Mesh(pg, petalMat);
        m.position.set(Math.cos(a) * R, cy + Math.sin(a) * R, 0);
        m.rotation.z = a - Math.PI / 2;          // base points outward from centre
        m.rotation.x = -0.5;                      // furled OPEN (tips lean away from the viewer/outward)
        g.add(m);
        // glowing vein up the petal centre
        const vp = []; for (let k = 0; k <= 6; k++) { const t = k / 6; vp.push(new THREE.Vector3(0, t * 20, Math.sin(t * Math.PI) * 5 + 0.1)); }
        const vein = new THREE.Line(new THREE.BufferGeometry().setFromPoints(vp), lineM(tint));
        vein.position.copy(m.position); vein.rotation.copy(m.rotation); g.add(vein);
      }
      // glowing seed core at the centre (the far-off locator)
      const seed = new THREE.Mesh(new THREE.IcosahedronGeometry(1.6, 0), glowM(tint, 2.2));
      seed.position.set(0, cy, 0); g.add(seed);
      return g;
    }

    const BUILD = { waystone, astrolabe, nightbloom };
    const TINT = { waystone: 0xbfe8ff, astrolabe: 0x9fb8ff, nightbloom: 0x8fe9ff };
    let built = null, mirror = null;
    const _box = new THREE.Box3(), _c = new THREE.Vector3(), _s = new THREE.Vector3();
    function build(kind) {
      if (built) { scene.remove(built); scene.remove(mirror); }
      built = BUILD[kind](TINT[kind]); scene.add(built);
      mirror = built.clone(); mirror.scale.y = -1; mirror.position.y = -0.15;
      mirror.traverse(o => { if (o.material) { o.material = o.material.clone(); o.material.transparent = true; o.material.opacity = 0.28; if (o.material.emissiveIntensity != null) o.material.emissiveIntensity *= 0.5; } });
      scene.add(mirror);
      built.updateMatrixWorld(true);
    }
    function fit(kind, angle) {
      _box.setFromObject(built); _box.getCenter(_c); _box.getSize(_s);
      const radius = 0.55 * Math.max(_s.x, _s.y, _s.z) || 1;
      const vfov = camera.fov * Math.PI / 180;
      const dist = (radius / Math.tan(vfov / 2)) / 0.82;
      const dir = angle === 'q34' ? [0.55, 0.1, 0.83] : [0.02, 0.06, 1];
      camera.up.set(0, 1, 0);
      const d = new THREE.Vector3(...dir).normalize();
      camera.position.copy(_c).addScaledVector(d, dist);
      camera.near = Math.max(0.1, dist / 500); camera.far = dist * 40; camera.updateProjectionMatrix();
      camera.lookAt(_c);
    }
    function sizeGL(px) { gl.width = px; gl.height = px; renderer.setSize(px, px, false); camera.aspect = 1; camera.updateProjectionMatrix(); }

    window.gcRender = (o) => { if (o.rebuild) build(o.kind); fit(o.kind, o.angle); renderer.render(scene, camera); return true; };
    const _sheet = document.getElementById('sheet');
    window.gcSheetInit = (cols, rows, cell) => { _sheet.width = cols * cell; _sheet.height = rows * cell; _sheet.style.display = 'block'; const ctx = _sheet.getContext('2d'); ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, _sheet.width, _sheet.height); _sheet.__cell = cell; _sheet.__cols = cols; sizeGL(cell); return true; };
    window.gcTile = (quad, label) => { const cell = _sheet.__cell, cols = _sheet.__cols, ctx = _sheet.getContext('2d'); const ox = (quad % cols) * cell, oy = ((quad / cols) | 0) * cell; ctx.drawImage(gl, ox, oy, cell, cell); if (label) { ctx.font = '600 22px system-ui'; ctx.textBaseline = 'top'; ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,.85)'; ctx.strokeText(label, ox + 14, oy + 14); ctx.fillStyle = '#ffe08a'; ctx.fillText(label, ox + 14, oy + 14); } return true; };

    try { renderer.setSize(700, 700, false); window.__ready = true; } catch (e) { window.__gcerr((e && e.stack) || String(e)); throw e; }
  </script>
</body>
</html>
