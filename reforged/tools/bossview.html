<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Boss viewer</title>
  <style>
    html,body{margin:0;height:100%;background:#0d1024;overflow:hidden;font-family:system-ui,sans-serif}
    #gl{display:block;width:100vw;height:100vh;touch-action:none}
    #hud{position:fixed;left:12px;top:12px;color:#bfe;font-size:13px;line-height:1.5;
      background:rgba(8,12,24,.55);padding:8px 10px;border-radius:8px;pointer-events:none;user-select:none}
    #hud b{color:#8fd0ff}
    #panel{position:fixed;right:12px;top:12px;width:238px;color:#cfe;font-size:12px;
      background:rgba(8,12,24,.6);padding:10px;border-radius:10px;user-select:none}
    #panel label{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:6px 0 2px}
    #panel input[type=range]{width:100%}
    #panel .val{color:#9fe06a;min-width:34px;text-align:right}
    .row{position:fixed;left:12px;bottom:12px;display:flex;gap:8px;flex-wrap:wrap;max-width:70vw}
    .row button,#panel button,#panel select{background:#16223c;color:#cfe;border:1px solid #2a3a5a;border-radius:8px;
      padding:6px 10px;font-size:13px;cursor:pointer}
    .row button.on,#panel button.on{background:#2a5;color:#04140a}
    #time{position:fixed;left:12px;right:270px;bottom:60px;display:flex;gap:10px;align-items:center;color:#cfe;font-size:12px}
    #time input[type=range]{flex:1}
    #err{position:fixed;left:12px;right:12px;top:64px;color:#ff9a9a;font-size:13px;line-height:1.5;
      white-space:pre-wrap;background:rgba(40,8,8,.6);padding:10px;border-radius:8px;display:none;max-height:50vh;overflow:auto}
  </style>
  <script type="importmap">{ "imports": { "three": "../lib/three.module.js" } }</script>
  <script>
    window.__bverr = (m) => { const e = document.getElementById('err'); if (e) { e.style.display = 'block'; e.textContent = 'Viewer error:\n' + m; } };
    window.addEventListener('error', (ev) => window.__bverr((ev.error && ev.error.stack) || ev.message || String(ev)));
    window.addEventListener('unhandledrejection', (ev) => window.__bverr('Promise: ' + ((ev.reason && ev.reason.stack) || ev.reason)));
  </script>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="err"></div>
  <div id="hud"><b id="lbl">marrowcoil</b> · t=<b id="tlbl">0.00</b>s · seed <b id="slbl">1</b><br>
    drag rotate · wheel zoom · deterministic replay (same seed + time + dials = same pixels)</div>
  <div id="time">
    <button id="bplay" class="on">⏸</button>
    <input id="tslider" type="range" min="0" max="20" step="0.05" value="0">
    <span id="tmax">/ 20s</span>
  </div>
  <div class="row" id="bosses"></div>
  <div id="panel">
    <label>view
      <span>
        <button data-view="rail">rail</button><button data-view="front">front</button><button data-view="profile">profile</button><button data-view="top">top</button>
      </span>
    </label>
    <label>charge <span class="val" id="vcharge">0</span></label>
    <input id="charge" type="range" min="0" max="1" step="0.01" value="0">
    <label>setpiece <span class="val" id="vsp">0</span></label>
    <input id="sp" type="range" min="0" max="1" step="0.01" value="0">
    <label>setpiece mode
      <select id="spmode"><option value="closingRibs">closingRibs (dread)</option><option value="ribThread">ribThread (fly-through)</option></select>
    </label>
    <label>death <span class="val" id="vdeath">0</span></label>
    <input id="death" type="range" min="0" max="1" step="0.01" value="0">
    <label>hp <span class="val" id="vhp">1</span></label>
    <input id="hp" type="range" min="0" max="1" step="0.01" value="1">
    <label style="justify-content:flex-start;gap:8px">
      <button id="bshield">shield</button>
      <button id="bnotice">notice</button>
      <button id="bwire">wire</button>
    </label>
    <label>gaze x <span class="val" id="vgx">0</span></label>
    <input id="gx" type="range" min="-1" max="1" step="0.01" value="0">
    <label>gaze y <span class="val" id="vgy">0</span></label>
    <input id="gy" type="range" min="-1" max="1" step="0.01" value="0">
    <label>seed <input id="seed" type="number" value="1" style="width:70px;background:#16223c;color:#cfe;border:1px solid #2a3a5a;border-radius:6px"></label>
  </div>
  <script type="module">
    import * as THREE from 'three';
    import { BOSSES, BOSS_ORDER } from '../js/bossDefs.js';
    import { buildBoss } from '../js/bossModel.js';
    import { mulberry32 } from '../js/util.js';

    // ------------------------------------------------------------------
    // bossview — an ISOLATED, DETERMINISTIC, rotatable boss stage.
    //
    // The design-review problem this solves: in-game captures freeze a live
    // fight, so every capture catches a different sweep phase / blink / gaze —
    // reviewers (human or gate agent) never see the same frame twice. Here:
    //   · Math.random is a SEEDED PRNG for the whole page, so the builders'
    //     blink/look-away schedules replay identically run after run.
    //   · Time is a FIXED-TIMESTEP simulation (1/60s). Scrubbing or changing
    //     any dial REBUILDS the model and re-simulates from t=0 — the same
    //     (seed, time, dials) tuple always renders the exact same pixels.
    //   · The camera orbits a still subject: rail/front/profile/top presets
    //     plus free drag, so the same look can be inspected from any angle.
    // Lighting mirrors the fight (ACES + hemi + warm sun ahead) on a dark
    // stage; no bloom pass, so HDR focals read as clipped white (as designed).
    // ------------------------------------------------------------------
    const params = new URLSearchParams(location.search);
    let key = params.get('boss') || 'marrowcoil';
    let seed = Number(params.get('seed') ?? 1);
    const nativeRandom = Math.random.bind(Math);

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x141031);   // astral-dark stage (the pale boss's §5h pairing)
    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 400);
    // Fight-alike lighting (environment.js): warm sun AHEAD of the boss (+z), hemi bounce.
    scene.add(new THREE.HemisphereLight(0x4a4a8a, 0x101030, 0.8));
    const sun = new THREE.DirectionalLight(0xbfd8ff, 1.3); sun.position.set(0.6, 2, 6); scene.add(sun);
    const rim = new THREE.DirectionalLight(0x7fb8ff, 0.5); rim.position.set(-3, 1.5, -4); scene.add(rim);

    // ---- deterministic sim state ----
    const DT = 1 / 60, T_MAX = 20;
    let model = null, current = null;
    let simT = 0, playing = true;
    const dials = { charge: 0, sp: 0, spmode: 'closingRibs', death: 0, hp: 1, shield: false, noticeAt: -1, gx: 0, gy: 0 };
    let wire = false;

    const center = new THREE.Vector3(0, 0, 0);
    let baseDist = 30;
    const orbit = { yaw: 0, pitch: -0.12, dist: 30 };   // bosses FACE +z (toward the player): yaw 0 = the rail's front-on view
    let freeCam = false;   // camMid interior shots place the camera directly; RAF must not stomp it

    function applyDials(m, t) {
      m.setGaze?.(dials.gx, dials.gy);
      m.setCharge?.(dials.charge);
      m.setAttackTell?.(dials.charge > 0 ? 'aimed' : null);
      m.setSetpiece?.(dials.sp, { id: dials.spmode });
      m.setShieldVisible?.(dials.shield);
      m.setHealth?.(dials.hp);
      m.setDissolve?.(dials.death);
      if (dials.noticeAt >= 0 && t >= dials.noticeAt && t - DT < dials.noticeAt) m.notice?.();
    }

    // Rebuild + re-simulate from t=0 to `t` at fixed steps — the reproducibility core.
    function simulate(t) {
      Math.random = mulberry32(seed);                       // identical blink/look-away schedules every run
      if (current) { scene.remove(current); current.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material && o.material.dispose) o.material.dispose(); }); }
      model = buildBoss(BOSSES[key], 1);
      current = model.group;
      current.scale.setScalar(BOSSES[key].scale ?? 1.5);    // finalize() sets this; explicit for clarity
      scene.add(current);
      const steps = Math.max(1, Math.round(t / DT));
      for (let i = 1; i <= steps; i++) { applyDials(model, i * DT); model.tick(DT, i * DT); }
      Math.random = nativeRandom;
      applyWire();
      simT = steps * DT;
      fitOnce();
      refreshHud();
    }
    // One live deterministic step (play mode) — still fixed-timestep.
    function step() {
      Math.random = mulberry32((seed * 9781 + Math.round(simT / DT)) >>> 0);   // per-step stream keyed on the step index
      simT = Math.min(T_MAX, simT + DT);
      applyDials(model, simT);
      model.tick(DT, simT);
      Math.random = nativeRandom;
      if (simT >= T_MAX) { simT = 0; simulate(0); }
      refreshHud();
    }

    let fitted = false;
    function fitOnce() {
      if (fitted || !current) return;
      current.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(current);
      box.getCenter(center);
      const s = box.getSize(new THREE.Vector3());
      baseDist = (0.5 * Math.max(s.x, s.y, s.z) / Math.tan(camera.fov * Math.PI / 360)) * 1.35;
      orbit.dist = baseDist;
      fitted = true;
    }
    function placeCamera() {
      const yaw = orbit.yaw * Math.PI / 180, p = orbit.pitch;
      camera.position.set(
        center.x + orbit.dist * Math.sin(yaw) * Math.cos(p),
        center.y + orbit.dist * Math.sin(p),
        center.z + orbit.dist * Math.cos(yaw) * Math.cos(p));
      camera.near = Math.max(0.05, orbit.dist / 100); camera.far = orbit.dist * 30;
      camera.updateProjectionMatrix();
      camera.lookAt(center);
    }
    function resize() {
      const w = gl.clientWidth, h = gl.clientHeight;
      renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);

    function applyWire() {
      if (!current) return;
      current.traverse(o => { if (o.material && 'wireframe' in o.material) o.material.wireframe = wire; });
    }
    function refreshHud() {
      document.getElementById('lbl').textContent = key;
      document.getElementById('tlbl').textContent = simT.toFixed(2);
      document.getElementById('slbl').textContent = seed;
      const ts = document.getElementById('tslider');
      if (document.activeElement !== ts) ts.value = simT;
    }

    function frame() {
      requestAnimationFrame(frame);
      if (playing && model) step();
      if (!freeCam) placeCamera();
      renderer.render(scene, camera);
    }

    // ── drag + zoom (nfview idiom) ──
    let dragging = false, lx = 0, ly = 0;
    gl.addEventListener('pointerdown', e => { dragging = true; freeCam = false; lx = e.clientX; ly = e.clientY; gl.setPointerCapture(e.pointerId); });
    gl.addEventListener('pointermove', e => {
      if (!dragging) return;
      orbit.yaw -= (e.clientX - lx) * 0.4;
      orbit.pitch = Math.max(-1.3, Math.min(1.3, orbit.pitch + (e.clientY - ly) * 0.006));
      lx = e.clientX; ly = e.clientY;
    });
    const stop = () => { dragging = false; };
    gl.addEventListener('pointerup', stop); gl.addEventListener('pointercancel', stop);
    gl.addEventListener('wheel', e => { e.preventDefault(); orbit.dist = Math.max(baseDist * 0.25, Math.min(baseDist * 3, orbit.dist * (1 + Math.sign(e.deltaY) * 0.08))); }, { passive: false });

    // ── controls ──
    const VIEWS = { rail: [0, -0.12, 1], front: [0, 0.05, 1], profile: [80, 0.05, 1], top: [0, 1.15, 1.1] };
    for (const b of document.querySelectorAll('button[data-view]')) b.onclick = () => {
      const [y, p, d] = VIEWS[b.dataset.view];
      orbit.yaw = y; orbit.pitch = p; orbit.dist = baseDist * d;
    };
    const resim = () => simulate(simT);
    const bind = (id, prop, lbl) => {
      const el = document.getElementById(id);
      el.oninput = () => { dials[prop] = Number(el.value); document.getElementById(lbl).textContent = el.value; resim(); };
    };
    bind('charge', 'charge', 'vcharge');
    bind('sp', 'sp', 'vsp');
    bind('death', 'death', 'vdeath');
    bind('hp', 'hp', 'vhp');
    bind('gx', 'gx', 'vgx');
    bind('gy', 'gy', 'vgy');
    document.getElementById('spmode').onchange = (e) => { dials.spmode = e.target.value; resim(); };
    document.getElementById('bshield').onclick = (e) => { dials.shield = !dials.shield; e.target.classList.toggle('on', dials.shield); resim(); };
    document.getElementById('bnotice').onclick = () => { dials.noticeAt = simT + DT; };   // fires on the next step
    document.getElementById('bwire').onclick = (e) => { wire = !wire; e.target.classList.toggle('on', wire); applyWire(); };
    document.getElementById('seed').onchange = (e) => { seed = Number(e.target.value) || 1; resim(); };
    document.getElementById('bplay').onclick = (e) => { playing = !playing; e.target.textContent = playing ? '⏸' : '▶'; e.target.classList.toggle('on', playing); };
    document.getElementById('tslider').oninput = (e) => { playing = false; document.getElementById('bplay').textContent = '▶'; document.getElementById('bplay').classList.remove('on'); simulate(Number(e.target.value)); };

    // boss picker row
    const row = document.getElementById('bosses');
    for (const k of BOSS_ORDER) {
      const b = document.createElement('button');
      b.textContent = k;
      b.classList.toggle('on', k === key);
      b.onclick = () => { key = k; fitted = false; for (const c of row.children) c.classList.toggle('on', c === b); simulate(simT); };
      row.appendChild(b);
    }

    // ── headless hook (capture tooling): set everything, render one still ──
    // opts: { boss, seed, t, charge, sp, spmode, death, hp, shield, gx, gy,
    //         yaw, pitch, distMul, focus } — focus aims the camera at a NAMED
    //         part ('skullGroup' | 'marrowScar' | 'ribPivot' | 'tailBlade' | ...)
    //         so close-ups frame the same anatomy every capture.
    //   INTERIOR mode: { camMid: [nameA, nameB], camOff: [x,y,z], look: name,
    //         fov } — puts the EYE at the midpoint of two named parts (plus a
    //         world offset) and looks at a third. This is how the canonical
    //         dread frame stands INSIDE the ribcage on the rail axis and looks
    //         forward at the skull through the closing aperture — a pose the
    //         orbit-a-focus math cannot express.
    window.renderState = (opts = {}) => {
      playing = false;
      if (opts.boss && opts.boss !== key) { key = opts.boss; fitted = false; }
      if (opts.seed != null) seed = opts.seed;
      // RESET to base state each call — dials must never leak between canonical
      // frames (a leaked charge=1 once produced byte-identical idle/charge files).
      Object.assign(dials, { charge: 0, sp: 0, spmode: 'closingRibs', death: 0, hp: 1, shield: false, noticeAt: -1, gx: 0, gy: 0 });
      for (const k of ['charge', 'sp', 'spmode', 'death', 'hp', 'shield', 'gx', 'gy']) if (opts[k] != null) dials[k] = opts[k];
      simulate(opts.t ?? 1.0);
      camera.fov = opts.fov ?? 50; camera.updateProjectionMatrix();   // reset per call — no leaks
      freeCam = false;
      if (opts.camMid) {
        current.updateMatrixWorld(true);
        const find = (nm) => { let o = null; current.traverse((x) => { if (x.name === nm && !o) o = x; }); return o; };
        const a = find(opts.camMid[0]), b = find(opts.camMid[1]), lk = find(opts.look || 'skullGroup');
        if (a && b && lk) {
          const pa = a.getWorldPosition(new THREE.Vector3()), pb = b.getWorldPosition(new THREE.Vector3());
          camera.position.copy(pa).add(pb).multiplyScalar(0.5);
          if (opts.camOff) camera.position.add(new THREE.Vector3(...opts.camOff));
          camera.near = 0.05; camera.far = 400; camera.updateProjectionMatrix();
          const tgt = lk.getWorldPosition(new THREE.Vector3());
          if (opts.lookOff) tgt.add(new THREE.Vector3(...opts.lookOff));
          camera.lookAt(tgt);
          freeCam = true;
          renderer.render(scene, camera);
          return true;
        }
      }
      if (opts.focus) {
        let obj = null;
        current.traverse((o) => { if (o.name === opts.focus && !obj) obj = o; });
        if (obj) { current.updateMatrixWorld(true); obj.getWorldPosition(center); }
      } else {
        fitted = false; fitOnce();   // recentre on the whole body
      }
      if (opts.yaw != null) orbit.yaw = opts.yaw;
      if (opts.pitch != null) orbit.pitch = opts.pitch;
      orbit.dist = baseDist * (opts.distMul ?? 1);
      placeCamera();
      renderer.render(scene, camera);
      return true;
    };

    // capture-tooling probe: world positions of named parts (for camera math)
    window.probeWorld = (names) => {
      if (!current) return null;
      current.updateMatrixWorld(true);
      const res = {};
      for (const nm of names) {
        let o = null; current.traverse((x) => { if (x.name === nm && !o) o = x; });
        if (o) { const v = o.getWorldPosition(new THREE.Vector3()); res[nm] = [+v.x.toFixed(2), +v.y.toFixed(2), +v.z.toFixed(2)]; }
      }
      return res;
    };

    try {
      resize();
      simulate(1.0);
      frame();
      window.__ready = true;
    } catch (e) { window.__bverr((e && e.stack) || String(e)); throw e; }
  </script>
</body>
</html>
