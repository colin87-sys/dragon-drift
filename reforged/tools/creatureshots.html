<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>html,body{margin:0;background:#0a0e1a}</style>
  <script type="importmap">{ "imports": { "three": "/lib/three.module.js" } }</script>
</head>
<body>
  <!-- One creature rendered in FULL COLOR + lighting at several named camera angles,
       so the agent can open the PNGs with vision and compare against a reference. The
       light rig + ACES tone-map are lifted verbatim from tiershots.html (the on-brand
       look). Angles mirror the authoritative framings in tools/silhouetteCore.mjs. -->
  <canvas id="gl" width="640" height="640"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { DRAGONS } from '/js/dragons.js';
    import { ascendedDef, maxTierFor } from '/js/ascension.js';
    import { buildDragonModel } from '/js/dragonModel.js';

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, alpha: false, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(2);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e1a);
    // The exact in-game-ish rig from tiershots: hemi + key/rim/fill directionals.
    scene.add(new THREE.HemisphereLight(0xbfdcff, 0x2e3448, 1.0));
    const keyL = new THREE.DirectionalLight(0xffe0b0, 1.8); keyL.position.set(2.5, 3, 4); scene.add(keyL);
    const rimL = new THREE.DirectionalLight(0x7fb8ff, 0.9); rimL.position.set(-3, 1.5, -3); scene.add(rimL);
    const fillL = new THREE.DirectionalLight(0xd0f0ff, 0.4); fillL.position.set(0, -2, 2); scene.add(fillL);
    const camera = new THREE.PerspectiveCamera(60, 1, 0.05, 400);

    let current = null;
    function disposeCurrent() {
      if (!current) return;
      scene.remove(current);
      current.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) { const m = o.material; (Array.isArray(m) ? m : [m]).forEach(x => x && x.dispose && x.dispose()); } });
      current = null;
    }

    // Place the camera for a named angle (mirrors silhouetteCore.mjs framings). `climb`
    // tips the model nose-up; the others auto-fit to the model bounds so it fills frame.
    function frame(angle, group, W, H) {
      group.rotation.x = (angle === 'climb') ? 0.92 : 0;
      group.updateMatrixWorld(true);
      // rear matches the live chase cam (FOV 72, main.js:59) so its foreshortening equals a gameplay
      // screenshot; framed views use 60 (framing only).
      camera.fov = (angle === 'rear') ? 72 : 60;
      const box = new THREE.Box3().setFromObject(group);
      const ctr = box.getCenter(new THREE.Vector3()), sz = box.getSize(new THREE.Vector3());
      const vfov = camera.fov * Math.PI / 180, hfov = 2 * Math.atan(Math.tan(vfov / 2) * (W / H));
      camera.up.set(0, 1, 0);
      if (angle === 'rear') {                       // the REAL chase cam (fixed framing)
        camera.position.set(0, 3.6, 12.3); camera.lookAt(0, 1.0, -16);
        camera.near = 0.1; camera.far = 200; camera.updateProjectionMatrix(); return;
      }
      let dir, perpW, perpH, look = ctr.clone();
      if (angle === 'climb') { dir = new THREE.Vector3(0, -0.42, 1.5); perpW = sz.x; perpH = sz.y; look.y += sz.y * 0.18; }
      else if (angle === 'threeq') { dir = new THREE.Vector3(0.85, 0.5, 1); perpW = Math.max(sz.x, sz.z); perpH = sz.y; }
      else if (angle === 'side') { dir = new THREE.Vector3(1, 0.18, 0); perpW = sz.z; perpH = sz.y; }
      else if (angle === 'front') { dir = new THREE.Vector3(0, 0.25, -1); perpW = sz.x; perpH = sz.y; }
      // top: straight down — reveals WIDTH ALONG THE LENGTH (where the body bulges/pinches,
      // and the wing's chord/sweep planform), the dimension rear/side foreshorten.
      else if (angle === 'top') { dir = new THREE.Vector3(0, 1, 0.0001); perpW = sz.x; perpH = sz.z; camera.up.set(0, 0, -1); }
      else { dir = new THREE.Vector3(0.85, 0.5, 1); perpW = Math.max(sz.x, sz.z); perpH = sz.y; }
      const fit = Math.max(perpH * 0.5 / Math.tan(vfov / 2), perpW * 0.5 / Math.tan(hfov / 2));
      camera.position.copy(ctr).addScaledVector(dir.normalize(), fit * 1.3);
      camera.near = fit / 100; camera.far = fit * 20; camera.lookAt(look);
      camera.updateProjectionMatrix();
    }

    // Render one creature at the requested angles; return { angle: dataURL }.
    window.renderCreature = (key, opts = {}) => {
      if (!DRAGONS[key]) return { error: `unknown creature: ${key}` };
      const maxT = maxTierFor(key);
      const tier = (opts.tier != null) ? Math.min(opts.tier, maxT) : maxT;
      const angles = opts.angles || ['rear', 'threeq', 'side', 'climb'];
      disposeCurrent();
      const def = ascendedDef(DRAGONS[key], tier, 0);
      current = buildDragonModel(def, opts.detail ? { detail: opts.detail } : {}).group;
      scene.add(current);
      const out = {};
      for (const a of angles) {
        // rear + climb render PORTRAIT to match the phone's gameplay aspect (the rear read is the
        // player's actual view); side/threeq/front stay landscape to show the long body profile.
        const portrait = (a === 'climb' || a === 'rear');
        const W = portrait ? 540 : 720, H = portrait ? 720 : 560;
        gl.width = W; gl.height = H;
        camera.aspect = W / H;
        renderer.setSize(W, H, false);
        frame(a, current, W, H);
        renderer.render(scene, camera);
        out[a] = gl.toDataURL('image/png');
      }
      return out;
    };
    window.__ready = true;
  </script>
</body>
</html>
