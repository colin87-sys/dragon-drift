<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Celestial Storm — Wing Bone Editor</title>
<style>
  :root{ --bg:#0a0e1a; --panel:#0f1526; --line:#243049; --ink:#cfe0ff; --dim:#7f8db0; --cyan:#6ae6ff; --bone:#7fe0ff; --mem:#c0f; }
  *{box-sizing:border-box} html,body{margin:0;background:var(--bg);color:var(--ink);font:13px/1.5 system-ui,sans-serif}
  header{padding:9px 14px;border-bottom:1px solid var(--line)} h1{font-size:15px;margin:0;color:var(--cyan)}
  .wrap{display:flex;gap:14px;padding:12px;align-items:flex-start;flex-wrap:wrap}
  #c{background:#080b14;border:1px solid var(--line);border-radius:10px;cursor:crosshair;touch-action:none;max-width:96vw;height:auto}
  .panel{min-width:250px;max-width:340px;display:flex;flex-direction:column;gap:9px}
  section{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px}
  button{background:#16223c;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer;margin:2px}
  button.go{background:var(--cyan);color:#04140a;border-color:var(--cyan);font-weight:700}
  .row{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
  .hint{color:var(--dim);font-size:12px} b{color:#ffd86a} label{color:var(--dim)} input[type=range]{flex:1}
</style>
</head>
<body>
<header><h1>Celestial Storm — Wing Bone Editor <span class="hint" id="status">loading…</span></h1></header>
<div class="wrap">
  <canvas id="c"></canvas>
  <div class="panel">
    <section>
      <div class="row"><b style="color:var(--cyan)">Mode</b></div>
      <div class="row">
        <button id="mDelete" class="go">delete bone</button>
        <button id="mAdd">add bone</button>
        <button id="mVein">tag vein</button>
        <button id="mBridge">bridge gap</button>
        <button id="mBoneFill">fill bone</button>
        <button id="mMem">fill membrane</button>
        <button id="mSealed" class="go">show sealed</button>
      </div>
      <div class="hint" id="help">DELETE: click a bone line to remove it (use this on the trailing scalloped edges — those are membrane, not bone).</div>
    </section>
    <section>
      <div class="row"><button id="reextract">re-extract bones</button><button id="finish" style="display:none">finish bone</button></div>
      <div class="row"><b style="color:var(--dim)">view</b><button id="zoomIn">zoom +</button><button id="zoomOut">zoom −</button><button id="zoomReset">reset</button><span class="hint">· wheel = zoom · shift/right-drag = pan</span></div>
      <div class="row"><label>ink threshold</label><input id="thr" type="range" min="120" max="240" value="200"><span id="thrv">200</span></div>
      <div class="row"><button id="undo">undo</button><button id="clearMem">clear membrane</button></div>
    </section>
    <section>
      <div class="row"><button id="export" class="go">Export bones → JSON</button></div>
      <div class="hint" id="counts"></div>
    </section>
  </div>
</div>
<script type="module">
import { thin, skeletonToPolylines, lum } from './lineTrace.mjs';
import { traceContour } from './tracerCore.mjs';

const W = 941, H = 1672, SIDE_MINX = 0.45;
const view = document.getElementById('c');
const off = document.createElement('canvas'); off.width = W; off.height = H;
const octx = off.getContext('2d', { willReadFrequently: true });
const vctx = view.getContext('2d');
const DS = Math.min(0.62, (innerWidth - 380) / W); view.width = Math.round(W * DS); view.height = Math.round(H * DS);

let img = null, ink = null, thr = 200, mode = 'delete';
let bones = [];               // [{pts:[{x,y}..]}] in pixel space
let veins = [];               // lightning vein polylines (snapped to ink)
let curBone = [], bridgeA = null, showSealed = true;
const bridges = [];           // gap-closing segments
const memCells = [], boneCells = [];          // tagged region ids per class (the struts are outlined → floodable)
let memLabels = new Int32Array(W * H), boneLabels = new Int32Array(W * H), regId = 0;

const stencil = new Image();
stencil.onload = () => { octx.drawImage(stencil, 0, 0, W, H); img = octx.getImageData(0, 0, W, H).data; computeInk(); extractBones(); composite(); };
stencil.src = './refs/celestial/stencil-wings.png';

function computeInk() { ink = new Uint8Array(W * H); for (let i = 0; i < W * H; i++) { const o = i * 4; ink[i] = (img[o] * 0.3 + img[o + 1] * 0.59 + img[o + 2] * 0.11) < thr ? 1 : 0; } for (const [a, b] of bridges) raster(a, b); computeSealed(); }
function raster(a, b) { const n = Math.max(1, Math.hypot(b.x - a.x, b.y - a.y) | 0); for (let s = 0; s <= n; s++) { const px = Math.round(a.x + (b.x - a.x) * s / n), py = Math.round(a.y + (b.y - a.y) * s / n); for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) { const x = px + dx, y = py + dy; if (x >= 0 && y >= 0 && x < W && y < H) ink[y * W + x] = 1; } } }

// auto-extract bones = welded full skeleton of the right wing ink (within the interior cells' padded bbox)
function extractBones() {
  // label non-ink cells; keep interior right-wing cells
  const lab = new Int32Array(W * H); let id = 0; const keep = new Set();
  for (let s = 0; s < W * H; s++) { if (ink[s] || lab[s]) continue; id++; const st = [s]; lab[s] = id; let n = 0, border = false, sx = 0; while (st.length) { const p = st.pop(); n++; const x = p % W, y = (p / W) | 0; sx += x; if (x === 0 || y === 0 || x === W - 1 || y === H - 1) border = true; const t = q => { if (!ink[q] && !lab[q]) { lab[q] = id; st.push(q); } }; if (x) t(p - 1); if (x < W - 1) t(p + 1); if (y) t(p - W); if (y < H - 1) t(p + W); } if (!border && n > 250 && sx / n / W > 0.5) keep.add(id); }
  let mnX = W, mnY = H, mxX = 0, mxY = 0; for (let i = 0; i < W * H; i++) if (keep.has(lab[i])) { const x = i % W, y = (i / W) | 0; if (x < mnX) mnX = x; if (x > mxX) mxX = x; if (y < mnY) mnY = y; if (y > mxY) mxY = y; }
  const PAD = 26, wingInk = new Uint8Array(W * H);
  for (let y = Math.max(0, mnY - PAD); y <= Math.min(H - 1, mxY + PAD); y++) for (let x = Math.max(0, mnX - PAD); x <= Math.min(W - 1, mxX + PAD); x++) { const i = y * W + x; if (ink[i] && x > SIDE_MINX * W) wingInk[i] = 1; }
  const polys = skeletonToPolylines(thin(wingInk, W, H), W, H, 6);
  bones = weld(polys, 9, 0.45).filter(c => plen(c) > 14).map(pts => ({ pts }));
  setStatus(`${bones.length} bones auto-extracted — edit them`);
}
const plen = (p) => { let s = 0; for (let i = 1; i < p.length; i++) s += Math.hypot(p[i].x - p[i - 1].x, p[i].y - p[i - 1].y); return s; };
function weld(polys, D, cosMin) {
  const ch = polys.map(p => p.slice());
  const uv = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by, m = Math.hypot(dx, dy) || 1; return { x: dx / m, y: dy / m }; };
  const out = (c, e) => { const n = c.length; return e === 's' ? uv(c[0].x, c[0].y, c[Math.min(1, n - 1)].x, c[Math.min(1, n - 1)].y) : uv(c[n - 1].x, c[n - 1].y, c[Math.max(0, n - 2)].x, c[Math.max(0, n - 2)].y); };
  for (; ;) { let best = null; for (let i = 0; i < ch.length; i++) for (let j = i + 1; j < ch.length; j++) for (const [ei, ej] of [['s', 's'], ['s', 'e'], ['e', 's'], ['e', 'e']]) { const pi = ei === 's' ? ch[i][0] : ch[i][ch[i].length - 1], pj = ej === 's' ? ch[j][0] : ch[j][ch[j].length - 1]; const g = Math.hypot(pi.x - pj.x, pi.y - pj.y); if (g > D) continue; const di = out(ch[i], ei), dj = out(ch[j], ej), dot = -(di.x * dj.x + di.y * dj.y); if (dot < cosMin) continue; const sc = dot - g * 0.04; if (!best || sc > best.sc) best = { i, j, ei, ej, sc }; } if (!best) break; let ci = ch[best.i], cj = ch[best.j]; if (best.ei === 's') ci = ci.slice().reverse(); if (best.ej === 'e') cj = cj.slice().reverse(); ch.splice(Math.max(best.i, best.j), 1); ch.splice(Math.min(best.i, best.j), 1); ch.push(ci.concat(cj)); }
  return ch;
}
function snap(sx, sy, R = 16) { if (sx >= 0 && sy >= 0 && sx < W && sy < H && ink[sy * W + sx]) return { x: sx, y: sy }; let b = null, bd = R * R + 1; for (let dy = -R; dy <= R; dy++) for (let dx = -R; dx <= R; dx++) { const x = sx + dx, y = sy + dy; if (x < 0 || y < 0 || x >= W || y >= H || !ink[y * W + x]) continue; const d = dx * dx + dy * dy; if (d < bd) { bd = d; b = { x, y }; } } return b || { x: sx, y: sy }; }
function dist2seg(p, a, b) { const dx = b.x - a.x, dy = b.y - a.y, L = dx * dx + dy * dy || 1; let t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / L; t = Math.max(0, Math.min(1, t)); const cx = a.x + dx * t, cy = a.y + dy * t; return Math.hypot(p.x - cx, p.y - cy); }
function nearestBone(p) { let bi = -1, bd = 14; bones.forEach((bn, i) => { for (let k = 0; k + 1 < bn.pts.length; k++) { const d = dist2seg(p, bn.pts[k], bn.pts[k + 1]); if (d < bd) { bd = d; bi = i; } } }); return bi; }
function nearestBridge(p) { let bi = -1, bd = 12; bridges.forEach(([a, b], i) => { const d = dist2seg(p, a, b); if (d < bd) { bd = d; bi = i; } }); return bi; }
function nearestVein(p) { let bi = -1, bd = 12; veins.forEach((v, i) => { for (let k = 0; k + 1 < v.length; k++) { const d = dist2seg(p, v[k], v[k + 1]); if (d < bd) { bd = d; bi = i; } } }); return bi; }
// snap a bridge endpoint onto an EXISTING line: nearest bone vertex (so bridges connect real geometry cleanly),
// falling back to the nearest drawn-ink pixel.
function snapToBone(sx, sy, R = 44) { let best = null, bd = R * R + 1; for (const b of bones) for (const p of b.pts) { const d = (p.x - sx) ** 2 + (p.y - sy) ** 2; if (d < bd) { bd = d; best = p; } } return best || snap(sx, sy); }
// SEALED = the enclosed interior of the right wing (non-ink not reachable from the image border). As gaps close,
// this grows; any notch reaching in from outside is an un-sealed gap. Recomputed whenever the ink changes.
let sealed = null;
function computeSealed() {
  const ext = new Uint8Array(W * H), st = [];
  const push = (q) => { if (!ink[q] && !ext[q]) { ext[q] = 1; st.push(q); } };
  for (let x = 0; x < W; x++) { push(x); push((H - 1) * W + x); } for (let y = 0; y < H; y++) { push(y * W); push(y * W + W - 1); }
  while (st.length) { const p = st.pop(), x = p % W, y = (p / W) | 0; if (x) push(p - 1); if (x < W - 1) push(p + 1); if (y) push(p - W); if (y < H - 1) push(p + W); }
  sealed = new Uint8Array(W * H); let n = 0; for (let i = 0; i < W * H; i++) { if (!ink[i] && !ext[i] && (i % W) > SIDE_MINX * W) { sealed[i] = 1; n++; } }
  return n;
}
function floodTag(sx, sy, isBone) {
  const lab = isBone ? boneLabels : memLabels;
  if (ink[sy * W + sx] || memLabels[sy * W + sx] || boneLabels[sy * W + sx]) return;   // already ink or tagged
  regId++; const st = [sy * W + sx]; lab[st[0]] = regId; let n = 0, border = false;
  while (st.length) { const p = st.pop(); n++; const x = p % W, y = (p / W) | 0; if (x === 0 || y === 0 || x === W - 1 || y === H - 1) border = true; const t = q => { if (!ink[q] && !memLabels[q] && !boneLabels[q]) { lab[q] = regId; st.push(q); } }; if (x) t(p - 1); if (x < W - 1) t(p + 1); if (y) t(p - W); if (y < H - 1) t(p + W); }
  if (n < 30 || border) { for (let i = 0; i < W * H; i++) if (lab[i] === regId) lab[i] = 0; if (border) setStatus('that was the exterior — click inside an enclosed region'); }
  else { (isBone ? boneCells : memCells).push(regId); setStatus(`${isBone ? 'bone' : 'membrane'} region tagged`); }
}

function composite() {
  octx.putImageData(new ImageData(new Uint8ClampedArray(img), W, H), 0, 0);
  const id = octx.getImageData(0, 0, W, H), d = id.data;
  for (let i = 0; i < W * H; i++) { const o = i * 4; d[o] *= 0.45; d[o + 1] *= 0.45; d[o + 2] = d[o + 2] * 0.45 + 22; if (showSealed && sealed && sealed[i]) { d[o] = d[o] * 0.72 + 30 * 0.28; d[o + 1] = d[o + 1] * 0.72 + 150 * 0.28; d[o + 2] = d[o + 2] * 0.72 + 70 * 0.28; } if (boneLabels[i]) { d[o] = d[o] * 0.45 + 120 * 0.55; d[o + 1] = d[o + 1] * 0.45 + 224 * 0.55; d[o + 2] = d[o + 2] * 0.45 + 255 * 0.55; } else if (memLabels[i]) { d[o] = d[o] * 0.5 + 150 * 0.5; d[o + 1] = d[o + 1] * 0.5 + 40 * 0.5; d[o + 2] = d[o + 2] * 0.5 + 200 * 0.5; } }
  octx.putImageData(id, 0, 0);
  octx.lineWidth = 2.4; octx.lineJoin = 'round';
  octx.strokeStyle = '#c79bff'; for (const v of veins) { octx.beginPath(); v.forEach((p, k) => k ? octx.lineTo(p.x, p.y) : octx.moveTo(p.x, p.y)); octx.stroke(); }   // lightning veins
  octx.lineWidth = 2.6; octx.strokeStyle = '#7fe0ff';
  for (const bn of bones) { octx.beginPath(); bn.pts.forEach((p, k) => k ? octx.lineTo(p.x, p.y) : octx.moveTo(p.x, p.y)); octx.stroke(); }
  octx.strokeStyle = '#6ae6ff'; for (const [a, b] of bridges) { octx.beginPath(); octx.moveTo(a.x, a.y); octx.lineTo(b.x, b.y); octx.stroke(); }
  if (curBone.length) { octx.strokeStyle = '#fff'; octx.beginPath(); curBone.forEach((p, k) => k ? octx.lineTo(p.x, p.y) : octx.moveTo(p.x, p.y)); octx.stroke(); octx.fillStyle = '#ffd86a'; for (const p of curBone) { octx.beginPath(); octx.arc(p.x, p.y, 4, 0, 7); octx.fill(); } }
  if (bridgeA) { octx.fillStyle = '#6ae6ff'; octx.beginPath(); octx.arc(bridgeA.x, bridgeA.y, 6, 0, 7); octx.fill(); }
  vctx.clearRect(0, 0, view.width, view.height); const vr = viewRect(); vctx.imageSmoothingEnabled = false; vctx.drawImage(off, vr.vx, vr.vy, vr.vw, vr.vh, 0, 0, view.width, view.height);
  let sn = 0; if (sealed) for (let i = 0; i < W * H; i++) sn += sealed[i];
  document.getElementById('counts').textContent = `${boneCells.length} bone-fills · ${memCells.length} membrane-fills · ${veins.length} veins · ${bridges.length} bridges · sealed ${(sn / 1000) | 0}k px`;
}
const setStatus = (t) => document.getElementById('status').textContent = t;

// ── zoom / pan: show a sub-rectangle of the image scaled to fill the canvas ──
let zoom = 1, ccx = W / 2, ccy = H / 2, panning = false, lastX = 0, lastY = 0;
function viewRect() { const vw = W / zoom, vh = H / zoom; let vx = ccx - vw / 2, vy = ccy - vh / 2; vx = Math.max(0, Math.min(W - vw, vx)); vy = Math.max(0, Math.min(H - vh, vy)); ccx = vx + vw / 2; ccy = vy + vh / 2; return { vx, vy, vw, vh }; }
function toImg(e) { const r = view.getBoundingClientRect(), fx = (e.clientX - r.left) / r.width, fy = (e.clientY - r.top) / r.height, v = viewRect(); return { x: Math.round(v.vx + fx * v.vw), y: Math.round(v.vy + fy * v.vh) }; }
view.addEventListener('contextmenu', (e) => e.preventDefault());
view.addEventListener('wheel', (e) => { e.preventDefault(); const r = view.getBoundingClientRect(), fx = (e.clientX - r.left) / r.width, fy = (e.clientY - r.top) / r.height, p = toImg(e); zoom = Math.max(1, Math.min(10, zoom * (e.deltaY < 0 ? 1.2 : 1 / 1.2))); ccx = p.x + (0.5 - fx) * (W / zoom); ccy = p.y + (0.5 - fy) * (H / zoom); composite(); }, { passive: false });
addEventListener('pointerup', () => panning = false);
addEventListener('pointermove', (e) => { if (!panning) return; const r = view.getBoundingClientRect(), v = viewRect(); ccx -= (e.clientX - lastX) / r.width * v.vw; ccy -= (e.clientY - lastY) / r.height * v.vh; lastX = e.clientX; lastY = e.clientY; composite(); });
view.addEventListener('pointerdown', (e) => {
  if (!img) return;
  if (e.button === 2 || e.shiftKey) { panning = true; lastX = e.clientX; lastY = e.clientY; return; }   // right-drag or Shift-drag = pan
  const { x, y } = toImg(e);
  if (x < 0 || y < 0 || x >= W || y >= H) return;
  if (mode === 'delete') { const vi = nearestVein({ x, y }); const i = nearestBone({ x, y }); if (i >= 0) { bones.splice(i, 1); setStatus('bone deleted'); } else if (vi >= 0) { veins.splice(vi, 1); setStatus('vein deleted'); } }
  else if (mode === 'add') curBone.push(snap(x, y));
  else if (mode === 'vein') curBone.push(snap(x, y));
  else if (mode === 'bridge') { const bi = nearestBridge({ x, y }); if (bi >= 0) { bridges.splice(bi, 1); bridgeA = null; computeInk(); setStatus('bridge removed'); composite(); return; } const s = snapToBone(x, y); if (!bridgeA) bridgeA = s; else { bridges.push([bridgeA, s]); bridgeA = null; computeInk(); setStatus('gap bridged'); } }
  else if (mode === 'mem') floodTag(x, y, false);
  else if (mode === 'bonefill') floodTag(x, y, true);
  composite();
});
const HELP = { delete: 'DELETE: click a bone (or vein) line to remove it.', add: 'ADD BONE: click points along a bone; each snaps to the nearest drawn line. Finish to commit.', vein: 'TAG VEIN: click points along a lightning vein; each snaps to the drawn line. Finish to commit.', bridge: 'BRIDGE: click an existing line END, then another, to close a gap (snaps to lines; click a bridge to delete it). Green = sealed.', bonefill: 'FILL BONE: once sealed (green), click inside each strut/bone region to tag it BONE (cyan).', mem: 'FILL MEMBRANE: click inside each membrane cell to tag it MEMBRANE (magenta). Leave the trailing scallops as membrane.' };
const setMode = (m) => { mode = m; for (const b of ['Delete', 'Add', 'Vein', 'Bridge', 'BoneFill', 'Mem']) document.getElementById('m' + b).classList.toggle('go', b.toLowerCase() === m || (m === 'bonefill' && b === 'BoneFill')); document.getElementById('help').textContent = HELP[m]; document.getElementById('finish').style.display = (m === 'add' || m === 'vein') ? '' : 'none'; bridgeA = null; composite(); };
document.getElementById('mDelete').onclick = () => setMode('delete');
document.getElementById('mAdd').onclick = () => setMode('add');
document.getElementById('mVein').onclick = () => setMode('vein');
document.getElementById('mBridge').onclick = () => setMode('bridge');
document.getElementById('mBoneFill').onclick = () => setMode('bonefill');
document.getElementById('mMem').onclick = () => setMode('mem');
document.getElementById('mSealed').onclick = (e) => { showSealed = !showSealed; e.target.classList.toggle('go', showSealed); composite(); };
document.getElementById('finish').onclick = () => { if (curBone.length >= 2) { if (mode === 'vein') veins.push(curBone); else bones.push({ pts: curBone }); } curBone = []; composite(); };
document.getElementById('reextract').onclick = () => { extractBones(); composite(); };
document.getElementById('zoomIn').onclick = () => { zoom = Math.min(10, zoom * 1.4); composite(); };
document.getElementById('zoomOut').onclick = () => { zoom = Math.max(1, zoom / 1.4); composite(); };
document.getElementById('zoomReset').onclick = () => { zoom = 1; ccx = W / 2; ccy = H / 2; composite(); };
document.getElementById('thr').oninput = (e) => { thr = +e.target.value; document.getElementById('thrv').textContent = thr; computeInk(); composite(); };
document.getElementById('undo').onclick = () => { if ((mode === 'add' || mode === 'vein') && curBone.length) curBone.pop(); else if (mode === 'vein' && veins.length) veins.pop(); else if (mode === 'add' && bones.length) bones.pop(); else if (mode === 'bridge' && bridges.length) { bridges.pop(); computeInk(); } else if (mode === 'bonefill' && boneCells.length) { const id = boneCells.pop(); for (let i = 0; i < W * H; i++) if (boneLabels[i] === id) boneLabels[i] = 0; } else if (mode === 'mem' && memCells.length) { const id = memCells.pop(); for (let i = 0; i < W * H; i++) if (memLabels[i] === id) memLabels[i] = 0; } composite(); };
document.getElementById('clearMem').onclick = () => { memLabels = new Int32Array(W * H); boneLabels = new Int32Array(W * H); memCells.length = 0; boneCells.length = 0; composite(); };
const nrm = (p) => [+(p.x / W).toFixed(4), +(p.y / H).toFixed(4)];
document.getElementById('export').onclick = () => {
  // bone SHAPES = the outline of each flood-tagged bone region (struts with real width)
  const boneShapes = boneCells.map(id => { const m = new Uint8Array(W * H); for (let i = 0; i < W * H; i++) m[i] = boneLabels[i] === id ? 1 : 0; return traceContour(m, W, H).map(nrm); }).filter(c => c.length > 3);
  const out = { canvas: [W, H], side: 'R', bones: bones.map(b => b.pts.map(nrm)), boneShapes, veins: veins.map(v => v.map(nrm)), bridges: bridges.map(([a, b]) => [nrm(a), nrm(b)]), membraneCells: memCells.length };
  const blob = new Blob([JSON.stringify(out)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'celestial-wing-bones-R.json'; a.click();
  setStatus(`exported ${bones.length} bone lines + ${boneShapes.length} bone shapes + ${veins.length} veins → celestial-wing-bones-R.json`);
};
</script>
</body>
</html>
