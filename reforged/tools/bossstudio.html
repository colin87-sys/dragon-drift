<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Boss studio</title>
  <style>
    html,body{margin:0;height:100%;background:#14121a;overflow:hidden;font-family:system-ui,sans-serif}
    #gl{display:block;width:100vw;height:100vh;touch-action:none}
    #hud{position:fixed;left:12px;top:12px;color:#bfe;font-size:13px;line-height:1.5;
      background:rgba(8,12,24,.55);padding:8px 10px;border-radius:8px;pointer-events:none;user-select:none}
    #hud b{color:#8fd0ff}
    /* Capture label (shown by the driver per angle; hidden by default). */
    #studiolabel{position:fixed;left:14px;top:14px;color:#fff;font-size:26px;font-weight:600;
      letter-spacing:.5px;text-shadow:0 2px 6px rgba(0,0,0,.85),0 0 2px rgba(0,0,0,.9);
      pointer-events:none;user-select:none;display:none}
    #panel{position:fixed;right:12px;top:12px;width:238px;color:#cfe;font-size:12px;
      background:rgba(8,12,24,.6);padding:10px;border-radius:10px;user-select:none}
    #panel label{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:6px 0 2px}
    #panel input[type=range]{width:100%}
    #panel .val{color:#9fe06a;min-width:34px;text-align:right}
    .row{position:fixed;left:12px;bottom:12px;display:flex;gap:8px;flex-wrap:wrap;max-width:70vw}
    .row button,#panel button,#panel select{background:#16223c;color:#cfe;border:1px solid #2a3a5a;border-radius:8px;
      padding:6px 10px;font-size:13px;cursor:pointer}
    .row button.on,#panel button.on{background:#2a5;color:#04140a}
    #err{position:fixed;left:12px;right:12px;top:64px;color:#ff9a9a;font-size:13px;line-height:1.5;
      white-space:pre-wrap;background:rgba(40,8,8,.6);padding:10px;border-radius:8px;display:none;max-height:50vh;overflow:auto}
  </style>
  <script type="importmap">{ "imports": { "three": "../lib/three.module.js" } }</script>
  <script>
    window.__bverr = (m) => { const e = document.getElementById('err'); if (e) { e.style.display = 'block'; e.textContent = 'Studio error:\n' + m; } };
    window.addEventListener('error', (ev) => window.__bverr((ev.error && ev.error.stack) || ev.message || String(ev)));
    window.addEventListener('unhandledrejection', (ev) => window.__bverr('Promise: ' + ((ev.reason && ev.reason.stack) || ev.reason)));
  </script>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="err"></div>
  <div id="studiolabel"></div>
  <div id="hud"><b id="lbl">eitherwing</b> · t=<b id="tlbl">0.00</b>s · seed <b id="slbl">1</b> · bg <b id="bglbl">dark</b><br>
    the STUDIO stage — bloom/ACES pipeline, two backdrops, deterministic replay (same seed + time + dials = same pixels)</div>
  <div class="row" id="bosses"></div>
  <div id="panel">
    <label>angle
      <span>
        <button data-angle="front">front</button><button data-angle="threequarter">3/4</button><button data-angle="profile">prof</button><button data-angle="topdown">top</button>
      </span>
    </label>
    <label>backdrop
      <span><button data-bg="dark">dark</button><button data-bg="pale">pale</button></span>
    </label>
    <label>charge <span class="val" id="vcharge">0</span></label>
    <input id="charge" type="range" min="0" max="1" step="0.01" value="0">
    <label>setpiece <span class="val" id="vsp">0</span></label>
    <input id="sp" type="range" min="0" max="1" step="0.01" value="0">
    <label>death <span class="val" id="vdeath">0</span></label>
    <input id="death" type="range" min="0" max="1" step="0.01" value="0">
    <label>hp <span class="val" id="vhp">1</span></label>
    <input id="hp" type="range" min="0" max="1" step="0.01" value="1">
    <label style="justify-content:flex-start;gap:8px">
      <button id="bshield">shield</button>
      <button id="bnotice">notice</button>
    </label>
    <label>seed <input id="seed" type="number" value="1" style="width:70px;background:#16223c;color:#cfe;border:1px solid #2a3a5a;border-radius:6px"></label>
  </div>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from '../lib/postprocessing/EffectComposer.js';
    import { RenderPass } from '../lib/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from '../lib/postprocessing/UnrealBloomPass.js';
    import { OutputPass } from '../lib/postprocessing/OutputPass.js';
    import { BOSSES, BOSS_ORDER } from '../js/bossDefs.js';
    import { buildBoss } from '../js/bossModel.js';
    import { mulberry32 } from '../js/util.js';

    // ------------------------------------------------------------------
    // bossstudio — the ISOLATED STUDIO stage (BOSS-DESIGN.md §7c).
    //
    // Adopts bossview.html's reproducibility core (seeded page PRNG, fixed-
    // timestep re-simulation from t=0, orbit camera, window.renderState) and
    // ADDS the three things §7c mandates for the studio gate:
    //   1. The game's REAL post-FX chain — EffectComposer + RenderPass +
    //      UnrealBloomPass + OutputPass (bloom thresholds in LINEAR light,
    //      ACES via OutputPass) — replicated from js/postfx.js. The design
    //      laws (G1 focal, G6 shield leash) are written against bloom, so the
    //      studio renders via composer.render(), never renderer.render().
    //   2. TWO backdrops (?bg=dark|pale) — near-dark 0x14121a and pale
    //      0xcfd6e4 — a boss must read against a dark sky AND a bright horizon.
    //   3. window.__dd = { scene, camera, renderer } + the boss group tagged
    //      userData.__isBoss, so bossgate.mjs's extractMask() runs VERBATIM on
    //      studio frames (the G1–G7 pixel gate on a controlled background).
    // Camera: FOV 72, auto-distance so the boss spans ~60% of frame height.
    // ------------------------------------------------------------------
    const params = new URLSearchParams(location.search);
    let key = params.get('boss') || 'eitherwing';
    if (!BOSSES[key]) key = 'eitherwing';
    let seed = Number(params.get('seed') ?? 1);
    let bg = params.get('bg') === 'pale' ? 'pale' : 'dark';
    const nativeRandom = Math.random.bind(Math);

    // §7c backdrop pair.
    const BACKDROPS = { dark: 0x14121a, pale: 0xcfd6e4 };

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;   // OutputPass applies this in the composer chain
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BACKDROPS[bg]);
    const FOV = 72;
    const camera = new THREE.PerspectiveCamera(FOV, 1, 0.1, 400);
    // Fight-alike lighting (environment.js): warm sun AHEAD of the boss (+z), hemi bounce.
    scene.add(new THREE.HemisphereLight(0x4a4a8a, 0x101030, 0.8));
    const sun = new THREE.DirectionalLight(0xbfd8ff, 1.3); sun.position.set(0.6, 2, 6); scene.add(sun);
    const rim = new THREE.DirectionalLight(0x7fb8ff, 0.5); rim.position.set(-3, 1.5, -4); scene.add(rim);

    // ---- post-FX chain (js/postfx.js parity: RenderPass → UnrealBloom → OutputPass) ----
    // HalfFloat multisampled target keeps AA + HDR headroom for bloom; the scene
    // pass renders LINEAR HDR (bloom thresholds in linear light), OutputPass does
    // ACES + sRGB encode. Bloom constructor args are copied verbatim from
    // js/postfx.js initPostFX (Vector2 resolution, strength 0.32, radius 0.25,
    // threshold 1.0), and the mip chain runs at half res (_bloomScale 0.5).
    const BLOOM_SCALE = 0.5;
    const composer = new EffectComposer(renderer, new THREE.WebGLRenderTarget(1, 1, { type: THREE.HalfFloatType, samples: 4 }));
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.32, 0.25, 1.0);
    composer.addPass(bloomPass);
    composer.addPass(new OutputPass());
    const render = () => composer.render();   // NEVER renderer.render — §7c mandates the bloom pipeline

    // ---- deterministic sim state ----
    const DT = 1 / 60, T_MAX = 20;
    let model = null, current = null;
    let simT = 0, playing = false;
    const dials = { charge: 0, sp: 0, spmode: 'figureEight', death: 0, hp: 1, shield: false, noticeAt: -1, gx: 0, gy: 0, handoff: null };

    const center = new THREE.Vector3(0, 0, 0);
    let baseDist = 30;
    const orbit = { yaw: 0, pitch: 0.05, dist: 30 };   // bosses FACE +z: yaw 0 = front-on
    let freeCam = false;

    // §7c named angles: front · 3/4 · profile · slight top-down. [yaw°, pitch rad].
    const ANGLES = {
      front:        [0,  0.05],
      threequarter: [40, 0.15],
      profile:      [90, 0.05],
      topdown:      [0,  0.9],
    };

    function applyDials(m, t) {
      m.setGaze?.(dials.gx, dials.gy);
      m.setCharge?.(dials.charge);
      m.setAttackTell?.(dials.charge > 0 ? 'aimed' : null);
      m.setSetpiece?.(dials.sp, { id: dials.spmode });
      m.setShieldVisible?.(dials.shield);
      m.setHealth?.(dials.hp);
      m.setDissolve?.(dials.death);
      if (dials.handoff != null) m.setDebugHandoff?.(dials.handoff);   // eitherwing eye-thread pin (§7c handoff frame)
      if (dials.noticeAt >= 0 && t >= dials.noticeAt && t - DT < dials.noticeAt) m.notice?.();
    }

    // Rebuild + re-simulate from t=0 to `t` at fixed steps — the reproducibility core.
    function simulate(t) {
      Math.random = mulberry32(seed);
      if (current) { scene.remove(current); current.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material && o.material.dispose) o.material.dispose(); }); }
      model = buildBoss(BOSSES[key], 1);
      current = model.group;
      current.scale.setScalar(BOSSES[key].scale ?? 1.5);
      current.userData.__isBoss = true;     // integration seam: extractMask() locates the boss by this flag
      scene.add(current);
      const steps = Math.max(1, Math.round(t / DT));
      for (let i = 1; i <= steps; i++) { applyDials(model, i * DT); model.tick(DT, i * DT); }
      Math.random = nativeRandom;
      simT = steps * DT;
      fitOnce();
      refreshHud();
    }
    function step() {
      Math.random = mulberry32((seed * 9781 + Math.round(simT / DT)) >>> 0);
      simT = Math.min(T_MAX, simT + DT);
      applyDials(model, simT);
      model.tick(DT, simT);
      Math.random = nativeRandom;
      if (simT >= T_MAX) { simT = 0; simulate(0); }
      refreshHud();
    }

    let fitted = false;
    function fitOnce() {
      if (fitted || !current) return;
      current.updateMatrixWorld(true);
      const box = new THREE.Box3().setFromObject(current);
      box.getCenter(center);
      const s = box.getSize(new THREE.Vector3());
      // Auto-distance so the largest extent spans ~60% of frame height (§7c).
      const maxDim = Math.max(s.x, s.y, s.z);
      baseDist = (0.5 * maxDim / Math.tan(camera.fov * Math.PI / 360)) / 0.60;
      orbit.dist = baseDist;
      fitted = true;
    }
    function placeCamera() {
      const yaw = orbit.yaw * Math.PI / 180, p = orbit.pitch;
      camera.position.set(
        center.x + orbit.dist * Math.sin(yaw) * Math.cos(p),
        center.y + orbit.dist * Math.sin(p),
        center.z + orbit.dist * Math.cos(yaw) * Math.cos(p));
      camera.near = Math.max(0.05, orbit.dist / 100); camera.far = orbit.dist * 30;
      camera.updateProjectionMatrix();
      camera.lookAt(center);
    }
    function resize() {
      const w = gl.clientWidth, h = gl.clientHeight;
      renderer.setSize(w, h, false); camera.aspect = w / h; camera.updateProjectionMatrix();
      composer.setPixelRatio(renderer.getPixelRatio());
      composer.setSize(w, h);
      bloomPass.setSize(w * BLOOM_SCALE, h * BLOOM_SCALE);
    }
    window.addEventListener('resize', resize);

    function setBackdrop(name) {
      bg = name === 'pale' ? 'pale' : 'dark';
      scene.background.setHex(BACKDROPS[bg]);
      const el = document.getElementById('bglbl'); if (el) el.textContent = bg;
    }
    function refreshHud() {
      document.getElementById('lbl').textContent = key;
      document.getElementById('tlbl').textContent = simT.toFixed(2);
      document.getElementById('slbl').textContent = seed;
    }

    function frame() {
      requestAnimationFrame(frame);
      if (playing && model) step();
      if (!freeCam) placeCamera();
      render();
    }

    // ── drag + zoom ──
    let dragging = false, lx = 0, ly = 0;
    gl.addEventListener('pointerdown', e => { dragging = true; freeCam = false; lx = e.clientX; ly = e.clientY; gl.setPointerCapture(e.pointerId); });
    gl.addEventListener('pointermove', e => {
      if (!dragging) return;
      orbit.yaw -= (e.clientX - lx) * 0.4;
      orbit.pitch = Math.max(-1.3, Math.min(1.3, orbit.pitch + (e.clientY - ly) * 0.006));
      lx = e.clientX; ly = e.clientY;
    });
    const stop = () => { dragging = false; };
    gl.addEventListener('pointerup', stop); gl.addEventListener('pointercancel', stop);
    gl.addEventListener('wheel', e => { e.preventDefault(); orbit.dist = Math.max(baseDist * 0.25, Math.min(baseDist * 3, orbit.dist * (1 + Math.sign(e.deltaY) * 0.08))); }, { passive: false });

    // ── controls ──
    for (const b of document.querySelectorAll('button[data-angle]')) b.onclick = () => {
      const [y, p] = ANGLES[b.dataset.angle];
      orbit.yaw = y; orbit.pitch = p; orbit.dist = baseDist;
    };
    for (const b of document.querySelectorAll('button[data-bg]')) b.onclick = () => setBackdrop(b.dataset.bg);
    const resim = () => simulate(simT);
    const bind = (id, prop, lbl) => {
      const el = document.getElementById(id);
      el.oninput = () => { dials[prop] = Number(el.value); document.getElementById(lbl).textContent = el.value; resim(); };
    };
    bind('charge', 'charge', 'vcharge');
    bind('sp', 'sp', 'vsp');
    bind('death', 'death', 'vdeath');
    bind('hp', 'hp', 'vhp');
    document.getElementById('bshield').onclick = (e) => { dials.shield = !dials.shield; e.target.classList.toggle('on', dials.shield); resim(); };
    document.getElementById('bnotice').onclick = () => { dials.noticeAt = 0.5; simulate(1.2); };
    document.getElementById('seed').onchange = (e) => { seed = Number(e.target.value) || 1; resim(); };

    // boss picker row
    const row = document.getElementById('bosses');
    for (const k of BOSS_ORDER) {
      const b = document.createElement('button');
      b.textContent = k;
      b.classList.toggle('on', k === key);
      b.onclick = () => { key = k; fitted = false; for (const c of row.children) c.classList.toggle('on', c === b); simulate(1.5); };
      row.appendChild(b);
    }

    // ── headless hook (capture tooling): set everything, render one still ──
    // opts: { boss, seed, t, charge, sp, spmode, death, hp, shield, noticeAt,
    //         gx, gy, handoff, angle, yaw, pitch, distMul, bg, fov }
    //   angle = one of front|threequarter|profile|topdown (or pass yaw/pitch).
    //   handoff (eitherwing) = model.setDebugHandoff(t): 0.5 = eye mid-thread.
    window.renderState = (opts = {}) => {
      playing = false;
      if (opts.boss && BOSSES[opts.boss] && opts.boss !== key) { key = opts.boss; fitted = false; }
      if (opts.seed != null) seed = opts.seed;
      if (opts.bg != null) setBackdrop(opts.bg);
      // RESET to base state each call — dials must never leak between canonical frames.
      Object.assign(dials, { charge: 0, sp: 0, spmode: 'figureEight', death: 0, hp: 1, shield: false, noticeAt: -1, gx: 0, gy: 0, handoff: null });
      for (const k of ['charge', 'sp', 'spmode', 'death', 'hp', 'shield', 'gx', 'gy', 'noticeAt', 'handoff']) if (opts[k] != null) dials[k] = opts[k];
      simulate(opts.t ?? 1.0);
      camera.fov = opts.fov ?? FOV; camera.updateProjectionMatrix();
      freeCam = false;
      // Angle: named preset OR explicit yaw/pitch.
      if (opts.angle && ANGLES[opts.angle]) { orbit.yaw = ANGLES[opts.angle][0]; orbit.pitch = ANGLES[opts.angle][1]; }
      if (opts.yaw != null) orbit.yaw = opts.yaw;
      if (opts.pitch != null) orbit.pitch = opts.pitch;
      orbit.dist = baseDist * (opts.distMul ?? 1);
      placeCamera();
      render();
      return true;
    };

    // capture-tooling probe: world positions of named parts (for camera math)
    window.probeWorld = (names) => {
      if (!current) return null;
      current.updateMatrixWorld(true);
      const res = {};
      for (const nm of names) {
        let o = null; current.traverse((x) => { if (x.name === nm && !o) o = x; });
        if (o) { const v = o.getWorldPosition(new THREE.Vector3()); res[nm] = [+v.x.toFixed(2), +v.y.toFixed(2), +v.z.toFixed(2)]; }
      }
      return res;
    };

    // Integration seam for bossgate.mjs extractMask(): the studio exposes the
    // same __dd shape the game does (scene/camera/renderer), so G1–G7 read the
    // live posed boss on a controlled background.
    window.__dd = { scene, camera, renderer };

    try {
      resize();
      simulate(1.5);
      frame();
      window.__ready = true;
    } catch (e) { window.__bverr((e && e.stack) || String(e)); throw e; }
  </script>
</body>
</html>
