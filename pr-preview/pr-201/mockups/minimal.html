<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
body{background:#0c0a12;padding:24px;display:flex;flex-direction:column;align-items:center;gap:6px;overflow:auto;}
h2{font-family:var(--font-d);letter-spacing:3px;font-size:19px;text-align:center;}
.sub{color:var(--rf-ink-2);font-size:12px;margin-bottom:14px;text-align:center;}
.row{display:flex;gap:26px;justify-content:center;flex-wrap:wrap;}
.frame{display:flex;flex-direction:column;align-items:center;gap:9px;}
.cap{font-size:11px;letter-spacing:1.5px;color:var(--rf-ink-3);text-transform:uppercase;}
.phone{position:relative;width:300px;height:640px;border-radius:30px;overflow:hidden;
  background:url('renders/plate-port.png') center/cover;box-shadow:0 18px 50px rgba(0,0,0,.6);}

/* minimal top chrome */
.pause{position:absolute;top:14px;left:14px;width:34px;height:34px;border-radius:50%;
  display:grid;place-items:center;color:#fff;background:rgba(20,14,12,.4);
  border:1px solid rgba(255,210,150,.25);backdrop-filter:blur(4px);}
.pause svg{width:13px;height:13px;}
.dist{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-family:var(--font-d);
  font-size:12px;letter-spacing:2px;color:#fff;opacity:.82;text-shadow:0 1px 6px rgba(0,0,0,.6);}
.score{position:absolute;top:14px;right:16px;font-family:var(--font-d);font-size:30px;color:#fff;
  text-shadow:0 0 16px rgba(255,180,90,.6),0 2px 5px rgba(0,0,0,.6);line-height:1;text-align:right;}
.score small{display:block;font-family:var(--font-ui);font-size:11px;letter-spacing:1px;color:#ffd9ac;
  margin-top:3px;opacity:.85;font-weight:700;}

/* health = quiet hearts, top-left under pause */
.hearts{position:absolute;top:56px;left:16px;display:flex;gap:4px;}
.hearts span{color:#ff8a7a;font-size:14px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.7));}
.hearts span.dim{color:rgba(255,160,150,.25);}

/* stamina arc cradling the dragon */
.arc{position:absolute;left:50%;transform:translateX(-50%);width:230px;height:88px;pointer-events:none;}
.arc.below{top:60%;}
.arc.above{top:34%;}
.arc svg{width:100%;height:100%;overflow:visible;}
.arc .trk{fill:none;stroke:rgba(255,255,255,.16);stroke-width:5;stroke-linecap:round;}
.arc .fil{fill:none;stroke:url(#sg);stroke-width:5;stroke-linecap:round;
  filter:drop-shadow(0 0 5px rgba(60,225,215,.8));}

/* surge gems — no label, no box; just a quiet row that fills as you chain */
.gemrow{position:absolute;left:50%;bottom:54px;transform:translateX(-50%);
  display:flex;gap:7px;align-items:center;}
.gemrow i{width:11px;height:11px;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);
  background:rgba(255,210,150,.18);box-shadow:inset 0 0 0 1px rgba(255,210,150,.3);}
.gemrow i.lit{background:linear-gradient(160deg,#ffe6a6,#ff8a3c);
  box-shadow:0 0 7px rgba(255,150,80,.95),0 0 2px rgba(255,225,160,.9);}
.mult{position:absolute;left:50%;bottom:74px;transform:translateX(-50%);
  font-family:var(--font-d);font-size:13px;color:#ffd9ac;opacity:.9;
  text-shadow:0 0 10px rgba(255,160,70,.6),0 1px 3px rgba(0,0,0,.6);letter-spacing:1px;}
</style></head>
<body>
  <h2>BEAUTY-FIRST HUD — minimal</h2>
  <div class="sub">stamina = arc cradling the dragon · health = quiet hearts · surge = bare gem row (no label/box)</div>
  <div class="row">

    <div class="frame"><div class="cap">A · stamina arc BELOW dragon</div>
      <div class="phone">
        <div class="pause"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg></div>
        <div class="dist">4,500 M</div>
        <div class="score">48,250<small>◆ 312</small></div>
        <div class="hearts"><span>♥</span><span>♥</span><span class="dim">♥</span></div>
        <div class="arc below"><svg viewBox="0 0 230 88" preserveAspectRatio="none">
          <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2bb6c9"/><stop offset="1" stop-color="#9affe6"/></linearGradient></defs>
          <path class="trk" pathLength="100" d="M 10 8 Q 115 96 220 8"/>
          <path class="fil" pathLength="100" stroke-dasharray="58 100" d="M 10 8 Q 115 96 220 8"/>
        </svg></div>
        <div class="mult">×2.4</div>
        <div class="gemrow"><i class="lit"></i><i class="lit"></i><i class="lit"></i><i class="lit"></i><i class="lit"></i><i></i><i></i><i></i></div>
      </div>
    </div>

    <div class="frame"><div class="cap">B · stamina arc ABOVE dragon</div>
      <div class="phone">
        <div class="pause"><svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg></div>
        <div class="dist">4,500 M</div>
        <div class="score">48,250<small>◆ 312</small></div>
        <div class="hearts"><span>♥</span><span>♥</span><span class="dim">♥</span></div>
        <div class="arc above"><svg viewBox="0 0 230 88" preserveAspectRatio="none">
          <path class="trk" pathLength="100" d="M 10 80 Q 115 -8 220 80"/>
          <path class="fil" pathLength="100" stroke-dasharray="58 100" d="M 10 80 Q 115 -8 220 80"/>
        </svg></div>
        <div class="mult" style="bottom:auto;top:30%">×2.4</div>
        <div class="gemrow"><i class="lit"></i><i class="lit"></i><i class="lit"></i><i class="lit"></i><i class="lit"></i><i></i><i></i><i></i></div>
      </div>
    </div>

  </div>
</body></html>
