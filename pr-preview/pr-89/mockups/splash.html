<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
.plate{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.grade{position:absolute;inset:0;background:
  radial-gradient(120% 80% at 50% 36%, transparent 30%, rgba(10,7,12,.55) 78%),
  linear-gradient(180deg,rgba(12,8,14,.45) 0%,transparent 26%,transparent 50%,rgba(10,7,12,.7) 86%);}
.ember{position:absolute;width:4px;height:4px;border-radius:50%;background:#ffd9a0;box-shadow:0 0 9px rgba(255,190,110,.9);animation:rise 9s linear infinite;opacity:0;}
@keyframes rise{0%{transform:translateY(40px);opacity:0;}15%{opacity:.95;}85%{opacity:.5;}100%{transform:translateY(-130px);opacity:0;}}

.topbar{position:absolute;top:18px;left:16px;right:16px;display:flex;align-items:center;justify-content:space-between;}
.wallet{display:flex;gap:8px;}
.gear{width:44px;height:44px;display:grid;place-items:center;color:var(--ink);}
.gear::after{display:none;}.rail .panel::after{display:none;}
.gear svg{width:20px;height:20px;}

.center{position:absolute;left:0;right:0;top:39%;transform:translateY(-50%);text-align:center;display:flex;flex-direction:column;align-items:center;}
.wordmark{font-family:var(--font-d);font-size:60px;line-height:.92;letter-spacing:2px;position:relative;
  background:linear-gradient(180deg,#fff6dd 0%,#ffd98a 42%,#ffae4d 70%,#ff7a36 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.6)) drop-shadow(0 0 22px rgba(255,150,70,.35));}
.wordmark::after{content:"DRAGON\ADRIFT";white-space:pre;position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.9) 48%,transparent 62%);
  background-size:280% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 4.5s ease-in-out infinite;}
@keyframes shine{0%,55%{background-position:200% 0;}90%,100%{background-position:-80% 0;}}
.tagline{margin-top:12px;font-size:12px;letter-spacing:6px;color:#ffe6c8;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.titlechip{margin-top:16px;}.titlechip .chip{font-style:italic;}
.cta{margin-top:120px;}
.hint{margin-top:16px;font-size:11px;letter-spacing:3px;color:var(--ink-3);text-shadow:0 1px 4px rgba(0,0,0,.7);}

.rail{position:absolute;left:14px;right:14px;bottom:24px;display:flex;gap:10px;}
.rail .item{flex:1;position:relative;}
.rail .panel{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;}
.rail svg{width:24px;height:24px;color:#ffd9ac;}
.rail .lab{font-size:10px;letter-spacing:1.5px;font-weight:700;color:var(--ink-2);}
.rail .item.on svg{color:#fff;}
</style></head>
<body><div class="stage">
  <img class="plate" src="renders/plate-port.png" alt="">
  <div class="grade"></div>
  <div class="ember" style="left:18%;animation-delay:0s"></div><div class="ember" style="left:36%;animation-delay:2s"></div>
  <div class="ember" style="left:60%;animation-delay:1s"></div><div class="ember" style="left:80%;animation-delay:3.5s"></div>
  <div class="ember" style="left:48%;animation-delay:5s"></div>

  <div class="topbar">
    <div class="wallet">
      <div class="chip"><span class="g num">◆ 24,500</span></div>
      <div class="chip">BEST <b class="num" style="margin-left:4px">24,500</b></div>
    </div>
    <div class="panel gear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg></div>
  </div>

  <div class="center">
    <div class="wordmark">DRAGON<br>DRIFT</div>
    <div class="tagline">THREAD THE RINGS · RIDE THE SURGE</div>
    <div class="titlechip"><div class="chip">« GOLDWING »</div></div>
    <div class="cta"><button class="btn btn-primary breathe">TAKE OFF</button>
      <div class="hint">DRAG TO STEER · HOLD TO BOOST</div></div>
  </div>

  <div class="rail">
    <div class="item"><div class="panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><div class="lab">PILOT</div></div></div>
    <div class="item"><div class="panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h14v16l-7-3-7 3z"/></svg><div class="lab">QUESTS</div></div><span class="badge"></span></div>
    <div class="item on"><div class="panel energy spark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/><path d="M6 6L5 3H2"/></svg><div class="lab">SHOP</div></div><span class="badge"></span></div>
    <div class="item"><div class="panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg><div class="lab">DAILY</div></div></div>
  </div>
  <div class="tag">Start / Hub · real game backdrop</div>
</div></body></html>
