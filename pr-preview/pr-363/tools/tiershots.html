<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>html,body{margin:0;background:#0a0e1a}</style>
  <script type="importmap">{ "imports": { "three": "/lib/three.module.js" } }</script>
</head>
<body>
  <canvas id="montage" width="1240" height="360"></canvas>
  <canvas id="gl" width="360" height="360" style="display:none"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { DRAGONS } from '/js/dragons.js';
    import { ascendedDef } from '/js/ascension.js';
    import { buildDragonModel } from '/js/dragonModel.js';

    const TIER_NAMES = ['Base', 'Kindled', 'Radiant', 'Eternal'];

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, alpha: true, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(2);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
    camera.position.set(0, 0.7, 7.6);
    camera.lookAt(0, 0.2, 0);
    scene.add(new THREE.HemisphereLight(0xbfdcff, 0x2e3448, 1.0));
    const keyL = new THREE.DirectionalLight(0xffe0b0, 1.8); keyL.position.set(2.5, 3, 4); scene.add(keyL);
    const rimL = new THREE.DirectionalLight(0x7fb8ff, 0.9); rimL.position.set(-3, 1.5, -3); scene.add(rimL);
    const fillL = new THREE.DirectionalLight(0xd0f0ff, 0.4); fillL.position.set(0, -2, 2); scene.add(fillL);

    let current = null;
    const _box = new THREE.Box3();
    // Match the in-game chase cam: behind and slightly above (dragon faces -z,
    // away from camera), so previews read like live gameplay.
    const _dir = new THREE.Vector3(0.06, 0.20, 0.95).normalize();

    // Measure a dragon's apex (T3) wingspan so every tier can be framed at ONE
    // fixed distance — that's what makes the size/silhouette RAMP visible
    // (re-framing each tier to the same width would hide the wingspan growth).
    function apexFraming(key) {
      const def = ascendedDef(DRAGONS[key], 3, 0);
      const { group } = buildDragonModel(def, {});
      scene.add(group);
      _box.setFromObject(group);
      const width = (_box.max.x - _box.min.x) || 4;
      const fov = camera.fov * Math.PI / 180;
      const dist = ((width * 0.5) / Math.tan(fov / 2)) * 1.32; // headroom for halo
      scene.remove(group);
      group.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
      return { dist, target: new THREE.Vector3(0, 0.2, 0.6) };
    }

    function renderTier(key, tier, frame) {
      if (current) {
        scene.remove(current);
        current.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
      }
      const def = ascendedDef(DRAGONS[key], tier, 0);
      const { group } = buildDragonModel(def, {});
      group.rotation.y = 0;
      // No hero pose: the membrane now bakes its own upward arc, so the neutral
      // rest silhouette is what actually reads from the rear gameplay camera.
      current = group;
      scene.add(group);
      camera.position.copy(frame.target).addScaledVector(_dir, frame.dist);
      camera.near = frame.dist / 100;
      camera.far = frame.dist * 20;
      camera.updateProjectionMatrix();
      camera.lookAt(frame.target);
      renderer.render(scene, camera);
    }

    window.renderDragon = (key) => {
      const m = document.getElementById('montage');
      const ctx = m.getContext('2d');
      ctx.fillStyle = '#0a0e1a';
      ctx.fillRect(0, 0, m.width, m.height);
      const PW = 310;
      const frame = apexFraming(key);
      for (let tier = 0; tier <= 3; tier++) {
        renderTier(key, tier, frame);
        const x = tier * PW;
        ctx.drawImage(gl, x + 5, 8, 300, 300);
        ctx.fillStyle = '#ffd86a';
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(`T${tier} · ${TIER_NAMES[tier]}`, x + PW / 2, 338);
        ctx.strokeStyle = 'rgba(140,200,255,0.15)';
        ctx.strokeRect(x + 5, 8, 300, 300);
      }
      return true;
    };
    window.__ready = true;
  </script>
</body>
</html>
