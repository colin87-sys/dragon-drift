<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Obstacle Studio</title>
  <style>
    html,body{margin:0;height:100%;background:#0a0e1a;overflow:hidden;font-family:system-ui,sans-serif}
    #gl{position:fixed;left:0;top:0}
    #sheet{position:fixed;left:0;top:0;display:none;background:#0a0e1a}
    #err{position:fixed;left:12px;right:12px;top:12px;color:#ff9a9a;font-size:13px;white-space:pre-wrap;
      background:rgba(40,8,8,.7);padding:10px;border-radius:8px;display:none;max-height:60vh;overflow:auto}
  </style>
  <script type="importmap">{ "imports": { "three": "../lib/three.module.js" } }</script>
  <script>
    window.__oserr = (m) => { const e = document.getElementById('err'); if (e) { e.style.display = 'block'; e.textContent = 'Studio error:\n' + m; } };
    window.addEventListener('error', (ev) => window.__oserr((ev.error && ev.error.stack) || ev.message || String(ev)));
    window.addEventListener('unhandledrejection', (ev) => window.__oserr('Promise: ' + ((ev.reason && ev.reason.stack) || ev.reason)));
  </script>
</head>
<body>
  <canvas id="gl" width="600" height="600"></canvas>
  <canvas id="sheet"></canvas>
  <div id="err"></div>
  <script type="module">
    import * as THREE from 'three';
    import { buildObstacleMesh } from '../js/obstacles.js';

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 4000);
    // Ice bodies are emissive-lit + faceted; a hemisphere + warm key so the facets
    // and the biome body colour read (no post/bloom in the studio).
    scene.add(new THREE.HemisphereLight(0xdfeaff, 0x2a2438, 1.1));
    const key = new THREE.DirectionalLight(0xffe6c0, 1.5); key.position.set(-3, 3, 4); scene.add(key);
    const fill = new THREE.DirectionalLight(0xbfe0ff, 0.5); fill.position.set(3, 1, 2); scene.add(fill);

    // Sky-gradient backdrops so a hazard is judged AGAINST a sky (bright = legibility test).
    function gradTex(stops) {
      const c = document.createElement('canvas'); c.width = 8; c.height = 256;
      const g = c.getContext('2d'); const grd = g.createLinearGradient(0, 0, 0, 256);
      for (const [p, col] of stops) grd.addColorStop(p, col);
      g.fillStyle = grd; g.fillRect(0, 0, 8, 256);
      const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
    }
    const BG = {
      frost:  gradTex([[0, '#7aa8d8'], [0.5, '#bcd8ee'], [0.8, '#e2f0fb'], [1, '#f4fbff']]),
      dusk:   gradTex([[0, '#141a3a'], [0.5, '#2a3566'], [0.8, '#5a6aa0'], [1, '#8aa0d0']]),
      dark:   gradTex([[0, '#0a0d18'], [1, '#1a2236']]),
    };
    function setBg(bg) { scene.background = BG[bg] || BG.frost; }

    // Per-type framing: pillar is tall (floor→h), bar is wide (spans the lane),
    // shard is a compact ball. Aim + radius chosen so each fills its tile.
    const FRAME = {
      pillar: { c: [0, 8, 0],  radius: 11 },
      bar:    { c: [0, 0, 0],  radius: 12 },
      shard:  { c: [0, 0, 0],  radius: 4.2 },
    };
    const ANGLES = {
      q34:    { dir: [0.62, 0.22, 0.78] },
      headon: { dir: [0.02, 0.04, 1] },
      side:   { dir: [1.0, 0.12, 0.22] },
    };

    let built = null;
    function dispose() { if (built) { scene.remove(built); built.traverse(o => { if (o.geometry) o.geometry.dispose(); }); built = null; } }
    function build(type, bi, opts) {
      dispose();
      built = buildObstacleMesh(type, bi, opts || {});
      scene.add(built);
      built.updateMatrixWorld(true);
      return built;
    }
    const _c = new THREE.Vector3();
    function fit(type, angle) {
      const f = FRAME[type] || FRAME.shard;
      _c.set(f.c[0], f.c[1], f.c[2]);
      const a = ANGLES[angle] || ANGLES.q34;
      const vfov = camera.fov * Math.PI / 180;
      const dist = (f.radius / Math.tan(vfov / 2)) / 0.9;
      camera.up.set(0, 1, 0);
      const d = new THREE.Vector3(a.dir[0], a.dir[1], a.dir[2]).normalize();
      camera.position.copy(_c).addScaledVector(d, dist);
      camera.near = Math.max(0.1, dist / 500); camera.far = dist * 40;
      camera.updateProjectionMatrix(); camera.lookAt(_c);
    }
    function sizeGL(px) { gl.width = px; gl.height = px; renderer.setSize(px, px, false); camera.aspect = 1; camera.updateProjectionMatrix(); }

    window.osRender = (o) => {
      if (!built || o.rebuild) build(o.type, o.bi || 0, { hitbox: o.hitbox, dynamic: o.dynamic, params: o.params });
      setBg(o.bg || 'frost');
      fit(o.type, o.angle || 'q34');
      renderer.render(scene, camera);
      return true;
    };

    const _sheet = document.getElementById('sheet');
    window.osSheetInit = (cols, rows, cell) => {
      _sheet.width = cols * cell; _sheet.height = rows * cell; _sheet.style.display = 'block';
      const ctx = _sheet.getContext('2d'); ctx.fillStyle = '#0a0e1a'; ctx.fillRect(0, 0, _sheet.width, _sheet.height);
      _sheet.__cell = cell; _sheet.__cols = cols; sizeGL(cell); return true;
    };
    window.osTile = (quad, label) => {
      const cell = _sheet.__cell, cols = _sheet.__cols, ctx = _sheet.getContext('2d');
      const ox = (quad % cols) * cell, oy = ((quad / cols) | 0) * cell;
      ctx.drawImage(gl, ox, oy, cell, cell);
      if (label) { ctx.font = '600 20px system-ui, sans-serif'; ctx.textBaseline = 'top';
        ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,.85)'; ctx.strokeText(label, ox + 12, oy + 12);
        ctx.fillStyle = '#ffe08a'; ctx.fillText(label, ox + 12, oy + 12); }
      return true;
    };

    window.__os = { scene, camera, renderer, group: () => built };
    try { renderer.setSize(600, 600, false); window.__ready = true; }
    catch (e) { window.__oserr((e && e.stack) || String(e)); throw e; }
  </script>
</body>
</html>
