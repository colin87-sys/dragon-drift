<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>loudshots — offline station render + BS.1770 metrics</title>
  <script type="importmap">
    { "imports": { "three": "../lib/three.module.js" } }
  </script>
</head>
<body>
  <pre id="out">loudshots harness</pre>
  <script type="module">
    // Exposes the offline renderer to the playwright drivers
    // (tools/loudshots.mjs and tools/bounce.mjs).
    import { measureStation, bounceStation, LAYER_SCENES } from '../js/sfxRender.js';
    import { TRACKS } from '../js/tracks.js';
    window.__stations = TRACKS.map((t, i) => ({ i, id: t.id, name: t.name }));
    window.__measure = (i, opts) => measureStation(i, opts);
    // Bounce → base64 chunks (playwright can't return an ArrayBuffer directly).
    window.__bounce = async (i, opts) => {
      const { wav, metrics } = await bounceStation(i, opts);
      const bytes = new Uint8Array(wav);
      let bin = '';
      const CHUNK = 0x8000;
      for (let o = 0; o < bytes.length; o += CHUNK) {
        bin += String.fromCharCode.apply(null, bytes.subarray(o, o + CHUNK));
      }
      return { b64: btoa(bin), metrics };
    };
    window.__ready = true;
  </script>
</body>
</html>
