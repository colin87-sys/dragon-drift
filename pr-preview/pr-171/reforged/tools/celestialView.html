<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Celestial Storm — Trace Definition Viewer</title>
<style>
  :root{ --bg:#0a0e1a; --panel:#0f1526; --line:#243049; --ink:#cfe0ff; --dim:#7f8db0; --cyan:#6ae6ff; }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:radial-gradient(120% 90% at 50% 0,#141a33,#0a0e1a);color:var(--ink);font:14px/1.5 system-ui,sans-serif}
  header{padding:14px 16px;border-bottom:1px solid var(--line)}
  h1{font-size:16px;margin:0;color:var(--cyan)} h1 small{color:var(--dim);font-weight:400;font-size:12px;margin-left:6px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding:16px}
  #c{background:#080b14;border:1px solid var(--line);border-radius:12px;max-width:96vw;height:auto;box-shadow:0 8px 40px rgba(0,0,0,.5)}
  .controls{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:820px}
  button{background:#16223c;color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:13px;cursor:pointer}
  button.on{background:var(--cyan);color:#04140a;border-color:var(--cyan);font-weight:600}
  .info{color:var(--dim);font-size:12px;max-width:720px;text-align:center}
  .seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{border:0;border-radius:0;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
</style>
</head>
<body>
<header><h1>Celestial Storm <small id="sub">trace definition</small></h1></header>
<div class="wrap">
  <canvas id="c" width="941" height="1672"></canvas>
  <div class="controls">
    <button id="bBody" class="on">body</button>
    <button id="bPlates" class="on">armour plates</button>
    <button id="bWings" class="on">wings</button>
    <button id="bStruts" class="on">struts</button>
    <button id="bVeins" class="on">veins</button>
    <button id="bDots">dots</button>
    <div class="seg">
      <button data-ref="none" class="on">no ref</button>
      <button data-ref="full">art</button>
    </div>
  </div>
  <div class="info" id="info">loading definition…</div>
</div>

<script type="module">
import { CELESTIAL_DEF as D } from '../js/celestialDef.js';

const c = document.getElementById('c'), ctx = c.getContext('2d');
const [CW, CH] = D.canvas; c.width = CW; c.height = CH;
const show = { body:true, plates:true, wings:true, struts:true, veins:true, dots:false };
let refImg = null;

const mirX = (p) => ({ x: (2*D.mirror - p[0]), y: p[1] });   // reflect a [x,y] across x = mirror
function path(pts, mir){ ctx.beginPath(); pts.forEach((p,i)=>{ const q = mir?mirX(p):{x:p[0],y:p[1]}; const x=q.x*CW, y=q.y*CH; i?ctx.lineTo(x,y):ctx.moveTo(x,y); }); }
function poly(pts, mir, close){ path(pts, mir); if(close) ctx.closePath(); }
function dotsOf(pts, mir, col){ ctx.fillStyle=col; pts.forEach(p=>{ const q=mir?mirX(p):{x:p[0],y:p[1]}; ctx.beginPath(); ctx.arc(q.x*CW,q.y*CH,3,0,7); ctx.fill(); }); }

function loadRef(name){ if(name==='none'){ refImg=null; draw(); return; } const im=new Image(); im.onload=()=>{ refImg=im; draw(); }; im.src='./refs/celestial/'+name+'.png'; }

function draw(){
  ctx.clearRect(0,0,CW,CH); ctx.fillStyle='#080b14'; ctx.fillRect(0,0,CW,CH);
  if(refImg){ ctx.globalAlpha=0.45; const ar=refImg.width/refImg.height; let w=CH*ar,h=CH; if(w>CW){w=CW;h=CW/ar;} ctx.drawImage(refImg,(CW-w)/2,(CH-h)/2,w,h); ctx.globalAlpha=1; }

  // wings (both sides) behind the body
  if(show.wings) for(const mir of [false,true]){ poly(D.wing.silhouette,mir,true); ctx.fillStyle='#3a1e60'; ctx.fill(); ctx.lineWidth=4; ctx.strokeStyle='#0a0c14'; ctx.stroke(); }
  if(show.struts) for(const mir of [false,true]) for(const s of D.wing.struts){ path(s,mir); ctx.lineWidth=2.4; ctx.strokeStyle='#78d2ff'; ctx.stroke(); }
  if(show.veins) for(const mir of [false,true]) for(const v of D.wing.veins){ path(v,mir); ctx.save(); ctx.shadowColor='#ff6ae6'; ctx.shadowBlur=10; ctx.lineWidth=2.2; ctx.strokeStyle='#ff8aee'; ctx.stroke(); ctx.restore(); }

  // body
  if(show.body){ poly(D.body.silhouette,false,true); ctx.fillStyle='#2a2450'; ctx.fill(); ctx.lineWidth=4; ctx.strokeStyle='#0a0c14'; ctx.stroke(); }
  if(show.plates) for(const pl of D.body.plates){ poly(pl,false,true); ctx.lineWidth=1.6; ctx.strokeStyle='rgba(140,180,235,.9)'; ctx.stroke(); }

  if(show.dots){
    if(show.wings) for(const mir of [false,true]) dotsOf(D.wing.silhouette,mir,'#ffb454');
    if(show.struts) for(const mir of [false,true]) D.wing.struts.forEach(s=>dotsOf(s,mir,'#78d2ff'));
    if(show.body) dotsOf(D.body.silhouette,false,'#9fe06a');
  }
}

const platePts = D.body.plates.reduce((s,p)=>s+p.length,0);
document.getElementById('info').textContent =
  `BODY: silhouette ${D.body.silhouette.length} + ${D.body.plates.length} armour plates (${platePts} pts) · WING: silhouette ${D.wing.silhouette.length} + ${D.wing.struts.length} struts + ${D.wing.veins.length} veins (mirrored across x=${D.mirror}) · source: ${D.source}`;
document.getElementById('sub').textContent = `trace definition · ${CW}×${CH}`;

const wire=(id,k)=>{ const b=document.getElementById(id); b.onclick=()=>{ show[k]=!show[k]; b.classList.toggle('on',show[k]); draw(); }; };
wire('bBody','body'); wire('bPlates','plates'); wire('bWings','wings'); wire('bStruts','struts'); wire('bVeins','veins'); wire('bDots','dots');
document.querySelectorAll('[data-ref]').forEach(b=>b.onclick=()=>{ document.querySelectorAll('[data-ref]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); loadRef(b.dataset.ref); });

draw();
</script>
</body>
</html>
