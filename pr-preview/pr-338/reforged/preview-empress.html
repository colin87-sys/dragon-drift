<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>The Dawnfire Empress — Live Preview</title>
  <style>
    :root { color-scheme: dark }
    * { box-sizing: border-box }
    html, body { margin: 0; height: 100%; background: #0e0b16; overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif; color: #f3e7d8 }
    #gl { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; touch-action: none; cursor: grab }
    #gl:active { cursor: grabbing }
    #title { position: fixed; left: 16px; top: 12px; pointer-events: none }
    #title b { font-size: 17px; letter-spacing: .02em; color: #ffd7a0 }
    #title span { display: block; font-size: 12px; color: #c9a9b7; margin-top: 2px }
    #formname { position: fixed; left: 16px; top: 56px; font-size: 13px; color: #e8b06a; font-weight: 600 }
    #bar { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); display: flex; gap: 6px;
      flex-wrap: wrap; justify-content: center; background: rgba(20,14,26,.72); backdrop-filter: blur(8px);
      padding: 8px; border-radius: 12px; border: 1px solid rgba(255,180,120,.15) }
    button { font: inherit; font-size: 12px; font-weight: 600; color: #f3e7d8; background: #2a1c2e;
      border: 1px solid rgba(255,180,120,.2); padding: 7px 11px; border-radius: 8px; cursor: pointer; transition: .12s }
    button:hover { background: #3a2740; border-color: rgba(255,180,120,.45) }
    button:focus-visible { outline: 2px solid #e8b06a; outline-offset: 2px }
    button.on { background: #7a1e34; border-color: #e0173a; color: #ffdca0 }
    #surge { background: #5a1220; border-color: #e0173a }
    #surge:active { background: #e0173a; color: #fff }
    .sep { width: 1px; background: rgba(255,180,120,.2); margin: 0 3px }
    #hint { position: fixed; right: 16px; bottom: 16px; font-size: 11px; color: #9a8a94; text-align: right; pointer-events: none }
    #err { position: fixed; left: 12px; right: 12px; top: 12px; color: #ff9a9a; font-size: 13px; white-space: pre-wrap;
      background: rgba(40,8,8,.7); padding: 10px; border-radius: 8px; display: none; max-height: 60vh; overflow: auto }
  </style>
  <script type="importmap">{ "imports": { "three": "./lib/three.module.js" } }</script>
  <script>
    window.addEventListener('error', (e) => { const el = document.getElementById('err'); if (el) { el.style.display = 'block'; el.textContent = 'Preview error:\n' + ((e.error && e.error.stack) || e.message); } });
  </script>
</head>
<body>
  <canvas id="gl"></canvas>
  <div id="title"><b>The Dawnfire Empress</b><span>Phoenix — premium rebuild · live preview</span></div>
  <div id="formname">Dawnfire Empress</div>
  <div id="bar">
    <button class="formbtn" title="Ash Hatchling">f0</button>
    <button class="formbtn" title="Kindled">f1</button>
    <button class="formbtn" title="Pyre Dancer">f2</button>
    <button class="formbtn on" title="Dawnfire Empress">f3</button>
    <div class="sep"></div>
    <button id="rear">Rear-chase</button>
    <button id="side">Side</button>
    <button id="orbit">Orbit</button>
    <div class="sep"></div>
    <button id="surge">Hold: Rebirth Surge</button>
  </div>
  <div id="hint">drag to rotate · scroll to zoom</div>
  <div id="err"></div>
  <script type="module" src="./preview_empress.mjs"></script>
</body>
</html>
