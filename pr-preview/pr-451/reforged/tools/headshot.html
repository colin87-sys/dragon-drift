<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>html,body{margin:0;background:#0a0e1a}</style>
  <script type="importmap">{ "imports": { "three": "/lib/three.module.js" } }</script>
</head>
<body>
  <canvas id="montage" width="1240" height="1050"></canvas>
  <canvas id="gl" width="340" height="340" style="display:none"></canvas>
  <script type="module">
    import * as THREE from 'three';
    import { DRAGONS } from '/js/dragons.js';
    import { ascendedDef } from '/js/ascension.js';
    import { buildDragonModel } from '/js/dragonModel.js';

    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, alpha: true, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(2);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.01, 100);
    scene.add(new THREE.HemisphereLight(0xbfdcff, 0x2e3448, 1.0));
    const keyL = new THREE.DirectionalLight(0xffe0b0, 1.9); keyL.position.set(2.5, 3, 4); scene.add(keyL);
    const rimL = new THREE.DirectionalLight(0x7fb8ff, 1.0); rimL.position.set(-3, 1.5, -3); scene.add(rimL);
    const fillL = new THREE.DirectionalLight(0xd0f0ff, 0.5); fillL.position.set(0, -2, 2); scene.add(fillL);

    // The three §8 backdrops — every head reads on all of them (L140: gold/pearl accents must be
    // judged against a warm sky too, and the pale frame is the silhouette/edge read).
    const BACKDROPS = [
      { name: 'dark', hex: 0x14121a }, { name: 'pale', hex: 0xcfd6e4 }, { name: 'gold', hex: 0xd9a24a },
    ];
    // Head faces -z (snout forward). Front sits in front of the face; 3/4 + Side for the showcase.
    // NAPE replaces the old Rear tile: the pure-rear camera sat at +z (toward the neck/body) and
    // clipped INSIDE the neck geometry — this looks DOWN at the dorsal-rear skull from behind-above,
    // clearing the neck and showing the rear-visible motif carrier region (§1: the dorsal is the
    // primary canvas; azure's crest / ember's nape collar / jade's rear carrier live here).
    const VIEWS = [
      { name: 'Front', dir: new THREE.Vector3(0.0, 0.22, -1).normalize(), distK: 1.0, up: 0.0 },
      { name: '3/4',   dir: new THREE.Vector3(-0.85, 0.3, -0.7).normalize(), distK: 1.0, up: 0.0 },
      { name: 'Side',  dir: new THREE.Vector3(-1, 0.16, 0.0).normalize(), distK: 1.0, up: 0.0 },
      { name: 'Nape',  dir: new THREE.Vector3(0.12, 0.82, 0.56).normalize(), distK: 1.25, up: 0.15 },
    ];
    let current = null;
    const _box = new THREE.Box3(), _c = new THREE.Vector3(), _s = new THREE.Vector3(), _focus = new THREE.Vector3();

    window.renderHead = (key, tier = 3) => {
      const m = document.getElementById('montage');
      const ctx = m.getContext('2d');
      if (current) { scene.remove(current); current.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); }); }
      const def = ascendedDef(DRAGONS[key], tier, 0);
      const { group, parts } = buildDragonModel(def, {});
      current = group; scene.add(group); group.updateMatrixWorld(true);
      // Hide the always-on-top gameplay aim marker (renderOrder 998/999) so the head reads clean.
      group.traverse(o => { if (o.renderOrder >= 998) o.visible = false; });
      const headObj = parts.head || group;
      _box.setFromObject(headObj); _box.getCenter(_c); _box.getSize(_s);
      const radius = Math.max(_s.x, _s.y, _s.z) * 0.5 || 1;
      const baseDist = (radius / Math.tan(camera.fov * Math.PI / 360)) * 2.1;
      const PW = 310, ROW = 340;
      for (let r = 0; r < BACKDROPS.length; r++) {
        scene.background = new THREE.Color(BACKDROPS[r].hex);   // render ON the backdrop (opaque)
        const y0 = r * ROW;
        for (let i = 0; i < VIEWS.length; i++) {
          const v = VIEWS[i], dist = baseDist * v.distK;
          _focus.copy(_c); _focus.y += radius * (v.up || 0);     // nape looks a touch up-crest
          camera.position.copy(_focus).addScaledVector(v.dir, dist);
          camera.near = dist / 100; camera.far = dist * 20; camera.updateProjectionMatrix();
          camera.lookAt(_focus);
          renderer.render(scene, camera);
          const x = i * PW;
          ctx.drawImage(gl, x + 5, y0 + 8, 300, 300);
          ctx.fillStyle = '#ffd86a'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'center';
          ctx.fillText(`${v.name} · ${BACKDROPS[r].name}`, x + PW / 2, y0 + 330);
          ctx.strokeStyle = 'rgba(140,200,255,0.15)'; ctx.strokeRect(x + 5, y0 + 8, 300, 300);
        }
      }
      scene.background = null;
      return true;
    };
    window.__ready = true;
  </script>
</body>
</html>
