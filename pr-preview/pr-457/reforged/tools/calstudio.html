<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Caldera Prop Studio</title>
  <style>
    html,body{margin:0;height:100%;background:#140806;overflow:hidden;font-family:system-ui,sans-serif}
    #gl{position:fixed;left:0;top:0}
    #sheet{position:fixed;left:0;top:0;display:none;background:#140806}
    #err{position:fixed;left:12px;right:12px;top:12px;color:#ffb0a0;font-size:13px;white-space:pre-wrap;
      background:rgba(40,8,8,.7);padding:10px;border-radius:8px;display:none;max-height:60vh;overflow:auto}
  </style>
  <script type="importmap">{ "imports": { "three": "../lib/three.module.js" } }</script>
  <script>
    window.__pserr = (m) => { const e = document.getElementById('err'); if (e) { e.style.display = 'block'; e.textContent = 'Studio error:\n' + m; } };
    window.addEventListener('error', (ev) => window.__pserr((ev.error && ev.error.stack) || ev.message || String(ev)));
    window.addEventListener('unhandledrejection', (ev) => window.__pserr('Promise: ' + ((ev.reason && ev.reason.stack) || ev.reason)));
  </script>
</head>
<body>
  <canvas id="gl" width="600" height="600"></canvas>
  <canvas id="sheet"></canvas>
  <div id="err"></div>
  <script type="module">
    import * as THREE from 'three';
    import { buildArchetypeMesh, calderaPropKeys } from '../js/environment.js';

    // ── lit stage (same ACES pipeline the game ships) ─────────────────────────
    const gl = document.getElementById('gl');
    const renderer = new THREE.WebGLRenderer({ canvas: gl, antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(46, 1, 0.01, 20000);

    // Lighting rigs. 'ember' is the DESIGN light — Caldera's shipping key (biomes.js
    // entry 3): a low warm sun + a HOT lava-floor ground bounce (hemiGround), so the
    // biome's light-from-BELOW signature reads and the inverted ladder's hot belly is
    // lit from underneath exactly as it will be over the lava. 'neutral' is flat, to
    // read silhouette/proportion without the ember drama.
    const rigs = {};
    function makeRig(name, fn) { const g = new THREE.Group(); fn(g); g.visible = false; scene.add(g); rigs[name] = g; }
    makeRig('ember', (g) => {
      // hemi: dark-warm sky over a HOT lava-floor bounce — the underside rescue that SELLS the inverted ladder
      g.add(new THREE.HemisphereLight(0x8a5040, 0x3a0f06, 1.15));
      const sun = new THREE.DirectionalLight(0xff9a50, 1.7); sun.position.set(-3.5, 1.0, 2.6); g.add(sun);  // low warm key
      const floor = new THREE.DirectionalLight(0xff5a1e, 1.0); floor.position.set(0.5, -2.2, 1.5); g.add(floor); // UP-light from the lava (light from below)
      const rim = new THREE.DirectionalLight(0xffc070, 0.7); rim.position.set(3.2, 1.8, -2.4); g.add(rim);   // warm back-rim
    });
    makeRig('neutral', (g) => {
      g.add(new THREE.HemisphereLight(0xcfd8e6, 0x3a3d47, 1.1));
      const k = new THREE.DirectionalLight(0xffffff, 1.4); k.position.set(2.5, 3, 4); g.add(k);
      const r = new THREE.DirectionalLight(0xdfeaff, 0.9); r.position.set(-3, 1.5, -3); g.add(r);
    });
    let curRig = 'ember';
    function setRig(name) { for (const k in rigs) rigs[k].visible = (k === name); curRig = name; }
    setRig('ember');

    // Backdrops: ember = the biome's lit horizon band (context — the value the props
    // silhouette against); pale = silhouette read; dark = value/glow read (the hot
    // belly + throats pop). Solid colours.
    const BG = { ember: 0xff7a30, dusk: 0xc0421c, pale: 0xcdd6e2, dark: 0x120806, slate: 0x2a1a16 };
    function setBg(bg) { scene.background = new THREE.Color(BG[bg] ?? BG.dark); }

    // ── angles ─────────────────────────────────────────────────────────────────
    // Caldera props are BROAD but the hero read is the COLUMNAR rib + the descending
    // crest, so front / front-¾ / side matter; top shows the footprint plan (the
    // flying game's primary view); low is the worm's-eye "feel colossal" read.
    const ANGLES = {
      front:   { dir: [0.02, 0.16, 1],   up: [0, 1, 0] },
      front3q: { dir: [0.72, 0.24, 0.82], up: [0, 1, 0] },
      side:    { dir: [1, 0.14, 0.02],   up: [0, 1, 0] },
      low:     { dir: [0.12, -0.16, 1],  up: [0, 1, 0] },
      top:     { dir: [0.0001, 1, 0.0001], up: [0, 0, -1] },
    };

    let built = null;
    const _box = new THREE.Box3(), _c = new THREE.Vector3(), _s = new THREE.Vector3();
    function dispose() {
      if (!built) return;
      scene.remove(built);
      built.traverse((o) => { if (o.geometry) o.geometry.dispose(); });
      built = null;
    }
    function build(key, opts) {
      dispose();
      built = buildArchetypeMesh(key, opts || {});
      scene.add(built);
      built.updateMatrixWorld(true);
      return built;
    }
    function fit(dir, up, fillFrac) {
      _box.setFromObject(built); _box.getCenter(_c); _box.getSize(_s);
      const radius = 0.5 * Math.max(_s.x, _s.y, _s.z) || 1;
      const vfov = camera.fov * Math.PI / 180;
      const dist = (radius / Math.tan(vfov / 2)) / (fillFrac || 0.82);
      camera.up.set(up[0], up[1], up[2]);
      const d = new THREE.Vector3(dir[0], dir[1], dir[2]).normalize();
      camera.position.copy(_c).addScaledVector(d, dist);
      camera.near = Math.max(0.01, dist / 500); camera.far = dist * 40;
      camera.updateProjectionMatrix();
      camera.lookAt(_c);
    }
    function render() { renderer.render(scene, camera); }
    function sizeGL(px) { gl.width = px; gl.height = px; renderer.setSize(px, px, false); camera.aspect = 1; camera.updateProjectionMatrix(); }

    // ── public API (calstudio.mjs drives these) ────────────────────────────────
    window.psKeys = () => calderaPropKeys();
    window.psRender = (o) => {
      build(o.key, o.opts || {});
      setBg(o.bg || 'dark');
      setRig(o.rig || 'ember');
      const a = ANGLES[o.angle] || ANGLES.front;
      fit(a.dir, a.up, o.fill);
      render();
      return true;
    };
    window.psReframe = (o) => {
      if (o.bg) setBg(o.bg);
      if (o.rig) setRig(o.rig);
      const a = ANGLES[o.angle] || ANGLES.front;
      fit(a.dir, a.up, o.fill);
      render();
      return true;
    };

    // ── in-page contact-sheet compositing ──────────────────────────────────────
    const _sheet = document.getElementById('sheet');
    window.psSheetInit = (cols, rows, cell) => {
      _sheet.width = cols * cell; _sheet.height = rows * cell;
      _sheet.style.display = 'block';
      const ctx = _sheet.getContext('2d');
      ctx.fillStyle = '#140806'; ctx.fillRect(0, 0, _sheet.width, _sheet.height);
      _sheet.__cell = cell; _sheet.__cols = cols;
      sizeGL(cell);
      return true;
    };
    window.psTile = (quad, label) => {
      const cell = _sheet.__cell, cols = _sheet.__cols;
      const ctx = _sheet.getContext('2d');
      const ox = (quad % cols) * cell, oy = ((quad / cols) | 0) * cell;
      ctx.drawImage(gl, ox, oy, cell, cell);
      if (label) {
        ctx.font = '600 20px system-ui, sans-serif'; ctx.textBaseline = 'top';
        ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,.85)'; ctx.strokeText(label, ox + 12, oy + 12);
        ctx.fillStyle = '#ffd08a'; ctx.fillText(label, ox + 12, oy + 12);
      }
      return true;
    };

    window.__ps = { scene, camera, renderer, group: () => built };
    try { renderer.setSize(600, 600, false); window.__ready = true; }
    catch (e) { window.__pserr((e && e.stack) || String(e)); throw e; }
  </script>
</body>
</html>
