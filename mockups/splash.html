<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
.sky{position:absolute;inset:0;background:
  radial-gradient(120% 70% at 50% 120%, #6a3b86 0%, #3a2a6e 22%, transparent 52%),
  radial-gradient(90% 60% at 72% 8%, rgba(61,240,255,.18), transparent 50%),
  linear-gradient(180deg,#0a0e26 0%,#0c1130 40%,#160f33 72%,#241340 100%);}
.stars{position:absolute;inset:0;background:
  radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 18%,#cfe,transparent),
  radial-gradient(1px 1px at 40% 12%,#fff,transparent),radial-gradient(1.5px 1.5px at 85% 40%,#fff,transparent),
  radial-gradient(1px 1px at 55% 36%,#bdf,transparent),radial-gradient(1px 1px at 12% 50%,#fff,transparent);opacity:.7;}
.aurora{position:absolute;left:-10%;right:-10%;top:18%;height:40%;
  background:radial-gradient(60% 80% at 30% 50%,rgba(61,240,255,.16),transparent 70%),
  radial-gradient(60% 80% at 75% 40%,rgba(196,107,255,.18),transparent 70%);filter:blur(20px);}
/* hero dragon, large, rising */
.hero{position:absolute;left:50%;top:46%;width:420px;transform:translate(-50%,-50%);
  filter:drop-shadow(0 30px 50px rgba(0,0,0,.6)) drop-shadow(0 0 40px rgba(120,140,255,.3));opacity:.96;}
.glow{position:absolute;left:50%;top:42%;width:340px;height:340px;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(120,150,255,.25),transparent 62%);filter:blur(6px);}
/* drifting motes */
.mote{position:absolute;width:4px;height:4px;border-radius:50%;background:#ffd9a0;
  box-shadow:0 0 8px rgba(255,200,120,.8);animation:rise 9s linear infinite;opacity:0;}
@keyframes rise{0%{transform:translateY(40px);opacity:0;}15%{opacity:.9;}85%{opacity:.6;}100%{transform:translateY(-120px);opacity:0;}}

.topbar{position:absolute;top:18px;left:16px;right:16px;display:flex;align-items:center;justify-content:space-between;}
.wallet{display:flex;gap:8px;}
.gear{width:44px;height:44px;display:grid;place-items:center;color:var(--ink);}
.gear svg{width:20px;height:20px;}

.center{position:absolute;left:0;right:0;top:50%;transform:translateY(-44%);text-align:center;display:flex;flex-direction:column;align-items:center;}
.wordmark{font-family:var(--font-d);font-size:62px;line-height:.9;letter-spacing:2px;position:relative;
  background:linear-gradient(180deg,#eafcff 0%,#9fd0ff 30%,#6f86ff 60%,#c46bff 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 4px 18px rgba(110,120,255,.5));}
.wordmark::after{content:"DRAGON\ADRIFT";white-space:pre;position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.85) 48%,transparent 62%);
  background-size:280% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 4.5s ease-in-out infinite;}
@keyframes shine{0%,55%{background-position:200% 0;}90%,100%{background-position:-80% 0;}}
.tagline{margin-top:10px;font-size:12px;letter-spacing:7px;color:var(--ink-2);font-weight:700;}
.titlechip{margin-top:16px;}
.titlechip .chip{font-style:italic;}
.cta{margin-top:30px;}
.hint{margin-top:16px;font-size:11px;letter-spacing:3px;color:var(--ink-3);}

/* bottom nav rail */
.rail{position:absolute;left:14px;right:14px;bottom:24px;display:flex;gap:10px;}
.rail .item{flex:1;position:relative;}
.rail .panel{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 4px;}
.rail svg{width:24px;height:24px;color:#bcd4ff;}
.rail .lab{font-size:10px;letter-spacing:1.5px;font-weight:700;color:var(--ink-2);}
.rail .item.on svg{color:#fff;}
</style></head>
<body><div class="stage">
  <div class="sky"></div><div class="stars"></div><div class="aurora"></div>
  <div class="glow"></div>
  <svg class="hero" viewBox="0 0 240 150">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7d93e8"/><stop offset=".6" stop-color="#3a4a8e"/><stop offset="1" stop-color="#1a2046"/></linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#9aa8ee"/><stop offset="1" stop-color="#2a3260"/></linearGradient></defs>
    <path d="M120 96 C150 66 200 34 238 8 C210 40 200 62 202 78 C220 68 232 74 240 86 C222 88 208 100 198 112 C176 102 150 104 134 112 Z" fill="url(#wg)"/>
    <path d="M120 96 C90 66 40 36 2 10 C30 42 40 62 38 80 C20 70 8 76 0 88 C18 90 32 102 42 114 C66 104 92 104 110 112 Z" fill="url(#wg)"/>
    <path d="M112 76 C124 68 142 70 152 86 C158 100 150 118 132 126 C118 132 98 130 90 116 C82 100 96 84 112 76 Z" fill="url(#bg)"/>
    <circle cx="140" cy="92" r="3.4" fill="#7fffe0"/>
  </svg>
  <div class="mote" style="left:20%;animation-delay:0s"></div><div class="mote" style="left:38%;animation-delay:2s"></div>
  <div class="mote" style="left:62%;animation-delay:1s"></div><div class="mote" style="left:78%;animation-delay:3.5s"></div>
  <div class="mote" style="left:50%;animation-delay:5s"></div>

  <div class="topbar">
    <div class="wallet">
      <div class="chip"><span class="g num">◆ 24,500</span></div>
      <div class="chip">BEST <b class="num" style="margin-left:4px">24,500</b></div>
    </div>
    <div class="panel gear"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg></div>
  </div>

  <div class="center">
    <div class="wordmark">DRAGON<br>DRIFT</div>
    <div class="tagline">ENDLESS FLIGHT</div>
    <div class="titlechip"><div class="chip">« GOLDWING »</div></div>
    <div class="cta"><button class="btn btn-primary breathe">TAKE OFF</button></div>
    <div class="hint">DRAG TO STEER · HOLD TO BOOST</div>
  </div>

  <div class="rail">
    <div class="item"><div class="panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><div class="lab">PILOT</div></div></div>
    <div class="item"><div class="panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 4h14v16l-7-3-7 3z"/></svg><div class="lab">QUESTS</div></div><span class="badge"></span></div>
    <div class="item on"><div class="panel energy"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/><path d="M6 6L5 3H2"/></svg><div class="lab">SHOP</div></div><span class="badge"></span></div>
    <div class="item"><div class="panel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg><div class="lab">DAILY</div></div></div>
  </div>
  <div class="tag">Start / Hub</div>
</div></body></html>
