<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
.sky{position:absolute;inset:0;background:
  radial-gradient(90% 60% at 50% 8%, rgba(255,150,70,.14), transparent 55%),
  radial-gradient(70% 50% at 50% 64%, rgba(255,110,60,.10), transparent 60%),
  linear-gradient(180deg,#0c0a12,#140d12 60%,#0e0a10);}
.top{position:absolute;top:0;left:0;right:0;height:64px;display:flex;align-items:center;padding:0 16px;gap:12px;
  background:linear-gradient(180deg,rgba(12,8,12,.92),rgba(12,8,12,0));}
.top h1{font-family:var(--font-d);font-size:24px;letter-spacing:3px;}
.top .bal{margin-left:auto;}
.x{width:40px;height:40px;display:grid;place-items:center;color:var(--ink);}
.x svg{width:18px;height:18px;}

.tabs{position:absolute;top:64px;left:14px;right:14px;display:flex;gap:8px;}
.tab{flex:1;text-align:center;padding:11px 0;font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--ink-2);
  background:rgba(40,26,18,.5);border:1px solid var(--stroke);clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);}
.tab.on{color:#2a1606;background:var(--energy);border-color:transparent;box-shadow:0 0 20px rgba(255,150,60,.4);}

/* hero stage — REAL dragon model, cropped from a live game frame */
.stagewrap{position:absolute;top:116px;left:16px;right:16px;height:300px;}
.spot{position:absolute;left:50%;top:0;width:250px;height:280px;transform:translateX(-50%);
  background:radial-gradient(50% 55% at 50% 38%,rgba(255,180,100,.20),transparent 70%);}
.dragonframe{position:absolute;left:50%;top:46%;width:300px;height:230px;transform:translate(-50%,-50%);
  overflow:hidden;-webkit-mask:radial-gradient(60% 60% at 50% 42%,#000 55%,transparent 78%);
  mask:radial-gradient(60% 60% at 50% 42%,#000 55%,transparent 78%);}
.dragonframe img{position:absolute;width:560px;left:-130px;top:-470px;filter:saturate(1.1) contrast(1.05);}
.ring3d{position:absolute;left:50%;bottom:30px;width:200px;height:50px;transform:translateX(-50%);
  border:2px solid rgba(255,190,110,.55);border-radius:50%;box-shadow:0 0 24px rgba(255,160,80,.45);}
.pedestal{position:absolute;left:50%;bottom:6px;width:230px;height:60px;transform:translateX(-50%);
  background:radial-gradient(50% 80% at 50% 30%,rgba(255,170,90,.4),transparent 70%);filter:blur(3px);}
.gem{position:absolute;right:6px;top:6px;display:flex;align-items:center;gap:6px;padding:5px 12px;font-size:11px;font-weight:700;letter-spacing:1px;
  color:#2a1606;background:var(--gold);border:1px solid rgba(255,220,150,.7);clip-path:polygon(7px 0,100% 0,100% 100%,0 100%);
  box-shadow:0 0 14px rgba(255,180,70,.5);}
.rothint{position:absolute;left:50%;bottom:2px;transform:translateX(-50%);font-size:10px;letter-spacing:3px;color:var(--ink-3);}

.info{position:absolute;top:420px;left:16px;right:16px;}
.dname{font-family:var(--font-d);font-size:30px;letter-spacing:1px;
  background:var(--energy);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 2px 8px rgba(255,120,50,.3));}
.dsub{font-size:12px;letter-spacing:1px;color:var(--ink-2);margin-top:2px;}
.pips{display:flex;gap:6px;margin:12px 0;}
.pips i{width:34px;height:5px;background:rgba(255,180,110,.22);clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);}
.pips i.on{background:var(--energy);box-shadow:0 0 8px rgba(255,160,70,.6);}
.stats{display:flex;flex-direction:column;gap:9px;margin-top:6px;}
.stat{display:flex;align-items:center;gap:10px;}
.stat .k{width:74px;font-size:11px;letter-spacing:2px;font-weight:700;color:var(--ink-2);}
.stat .meter{flex:1;height:9px;}
.stat .v{width:30px;text-align:right;font-family:var(--font-d);font-size:13px;color:#ffdca6;}
.fill-e{background:var(--energy);box-shadow:0 0 8px rgba(255,160,70,.5);}

.buy{position:absolute;left:16px;right:16px;bottom:96px;}
.buy .btn-primary{width:100%;display:block;text-align:center;}

.thumbs{position:absolute;left:0;right:0;bottom:24px;display:flex;gap:10px;padding:0 16px;overflow:hidden;}
.th{width:62px;height:62px;flex:none;position:relative;background:rgba(36,22,16,.6);border:1px solid var(--stroke);
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);display:grid;place-items:center;}
.th .o{width:30px;height:30px;border-radius:50%;}
.th.on{border-color:var(--e2);box-shadow:0 0 18px rgba(255,170,70,.5);}
.th .dot{position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-radius:50%;background:#5fe0a0;box-shadow:0 0 6px #5fe0a0;}
.th.lock{opacity:.5;}
.th .lk{position:absolute;font-size:14px;}
</style></head>
<body><div class="stage">
  <div class="sky"></div>
  <div class="top">
    <h1>SHOP</h1>
    <div class="bal chip"><span class="g num">◆ 24,500</span></div>
    <div class="panel x" style="clip-path:none;border-radius:50%;width:40px;height:40px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 6l12 12M18 6L6 18"/></svg></div>
  </div>
  <div class="tabs">
    <div class="tab on">DRAGONS</div><div class="tab">RIDERS</div><div class="tab">MUSIC</div><div class="tab">STYLE</div>
  </div>

  <div class="stagewrap">
    <div class="spot"></div>
    <div class="dragonframe"><img src="renders/plate-port.png" alt="real dragon model"></div>
    <div class="ring3d"></div><div class="pedestal"></div>
    <div class="gem">◆ SSR · RADIANT</div>
    <div class="rothint">⟲ DRAG TO ROTATE · LIVE 3D MODEL</div>
  </div>

  <div class="info">
    <div class="dname">SOLAR SOVEREIGN</div>
    <div class="dsub">Apex of the ember line · sun-forged scales</div>
    <div class="pips"><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div>
    <div class="stats">
      <div class="stat"><span class="k">SPEED</span><div class="meter"><i class="fill-e" style="width:88%"></i></div><span class="v num">88</span></div>
      <div class="stat"><span class="k">AGILITY</span><div class="meter"><i class="fill-e" style="width:74%"></i></div><span class="v num">74</span></div>
      <div class="stat"><span class="k">STAMINA</span><div class="meter"><i class="fill-e" style="width:81%"></i></div><span class="v num">81</span></div>
    </div>
  </div>

  <div class="buy"><button class="btn btn-primary breathe">UNLOCK · ◆ 5,000</button></div>

  <div class="thumbs">
    <div class="th"><span class="o" style="background:radial-gradient(circle at 35% 30%,#9fb0ff,#3a4a8e)"></span><span class="dot"></span></div>
    <div class="th on"><span class="o" style="background:radial-gradient(circle at 35% 30%,#ffd98a,#f0954e)"></span></div>
    <div class="th"><span class="o" style="background:radial-gradient(circle at 35% 30%,#7fffe0,#2bb6c9)"></span><span class="dot"></span></div>
    <div class="th lock"><span class="o" style="background:radial-gradient(circle at 35% 30%,#d6b0ff,#7c4bd0)"></span><span class="lk">🔒</span></div>
    <div class="th lock"><span class="o" style="background:radial-gradient(circle at 35% 30%,#ff9fce,#c43c7a)"></span><span class="lk">🔒</span></div>
  </div>
  <div class="tag">Shop · Dragon select (real 3D model)</div>
</div></body></html>
